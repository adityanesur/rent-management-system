<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RentFlow | Payment Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
            display: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .payments-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .payments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .header-left p {
            color: #b0d0ff;
        }

        .header-right {
            display: flex;
            gap: 1rem;
        }

        .admin-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .admin-btn:hover {
            border-color: #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            transform: translateY(-2px);
        }

        .admin-btn.danger {
            background: rgba(255, 75, 75, 0.2);
            border-color: rgba(255, 75, 75, 0.4);
        }

        .admin-btn.danger:hover {
            background: rgba(255, 75, 75, 0.3);
            border-color: #ff4b4b;
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0f1f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 1.3rem;
            color: #7bc9ff;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 183, 255, 0.3);
            border-top-color: #00b7ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Access Denied */
        .access-denied {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 75, 75, 0.3);
            border-radius: 30px;
            max-width: 500px;
            margin: 4rem auto;
        }

        .access-denied i {
            font-size: 4rem;
            color: #ff4b4b;
            margin-bottom: 1rem;
        }

        .access-denied h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #ff6b6b;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 25px;
            padding: 1.5rem;
        }

        .stat-icon {
            font-size: 2rem;
            color: #00b7ff;
            margin-bottom: 1rem;
        }

        .stat-label {
            color: #b0d0ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        /* Filters */
        .filters-section {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 25px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: #7bc9ff;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .filter-select {
            padding: 0.8rem 1rem;
            background: rgba(10, 20, 40, 0.8);
            border: 1px solid rgba(0, 183, 255, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #00b7ff;
        }

        /* Table */
        .table-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 30px;
            padding: 2rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .table-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            text-align: left;
            padding: 1.2rem 1rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
        }

        tr:hover td {
            background: rgba(0, 183, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-paid {
            background: rgba(92, 255, 157, 0.2);
            color: #5cff9d;
            border: 1px solid rgba(92, 255, 157, 0.3);
        }

        .status-pending {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .action-btn {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 0.25rem;
            border: none;
            font-size: 0.9rem;
        }

        .btn-paid {
            background: rgba(92, 255, 157, 0.2);
            color: #5cff9d;
            border: 1px solid #5cff9d;
        }

        .btn-pending {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .btn-paid:hover, .btn-pending:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .message {
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .message.success {
            background: rgba(92, 255, 157, 0.1);
            border: 1px solid #5cff9d;
            color: #5cff9d;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .table-card { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Checking authorization...</div>
    </div>

    <div class="payments-container">
        <div class="payments-header">
            <div class="header-left">
                <h1><i class="fas fa-credit-card"></i> Payment Management</h1>
                <p>Track and manage all tenant payments</p>
            </div>
            <div class="header-right">
                <a href="admin.html" class="admin-btn">
                    <i class="fas fa-arrow-left"></i> Back to Admin
                </a>
                <button class="admin-btn danger" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <!-- Access Denied (hidden by default) -->
        <div id="accessDenied" style="display: none;">
            <div class="access-denied">
                <i class="fas fa-shield-alt"></i>
                <h2>Access Denied</h2>
                <p>Admin privileges required.</p>
                <a href="login.html" class="admin-btn" style="display: inline-block;">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div id="mainContent" style="display: none;">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-credit-card"></i></div>
                    <div class="stat-label">Total Payments</div>
                    <div class="stat-value" id="totalPayments">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                    <div class="stat-label">Total Amount</div>
                    <div class="stat-value" id="totalAmount">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-label">Completed</div>
                    <div class="stat-value" id="completedAmount">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="pendingAmount">₹0</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-section">
                <div class="filters-title">
                    <i class="fas fa-filter"></i>
                    <span>Filter Payments</span>
                </div>
                <div class="filters-grid">
                    <select id="monthFilter" class="filter-select">
                        <!-- Will be populated dynamically -->
                    </select>
                    <select id="statusFilter" class="filter-select">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="paid">Paid</option>
                    </select>
                </div>
            </div>

            <!-- Payments Table -->
            <div class="table-card">
                <div class="table-header">
                    <h2><i class="fas fa-list"></i> All Payments</h2>
                    <button class="admin-btn" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div class="table-container">
                    <table id="paymentsTable">
                        <thead>
                            <tr>
                                <th>Tenant</th>
                                <th>Room</th>
                                <th>Month</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            updateDoc, 
            doc,
            getDoc,
            query,
            where,
            orderBy
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allPayments = [];
        let currentUser = null;

        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
        }

        // Format date
        function formatDate(date) {
            if (!date) return 'N/A';
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('en-IN', { 
                day: 'numeric', 
                month: 'short', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Populate month filter
        function populateMonthFilter() {
            const months = [];
            const now = new Date();
            for (let i = 0; i < 6; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push(d.toLocaleString('default', { month: 'long', year: 'numeric' }));
            }
            
            const select = document.getElementById('monthFilter');
            select.innerHTML = '<option value="all">All Months</option>';
            months.forEach(month => {
                select.innerHTML += `<option value="${month}">${month}</option>`;
            });
        }

        // Load payments with filters
        async function loadPayments() {
            const tbody = document.getElementById("paymentsTableBody");
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">Loading payments...</td></tr>';

            try {
                const monthFilter = document.getElementById('monthFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;

                let q = collection(db, "rents");
                q = query(q, orderBy("date", "desc"));
                
                const querySnapshot = await getDocs(q);
                
                let filteredPayments = [];
                let totalAmount = 0;
                let completedAmount = 0;
                let pendingAmount = 0;

                querySnapshot.forEach((docSnap) => {
                    const data = { id: docSnap.id, ...docSnap.data() };
                    
                    // Apply filters
                    if (monthFilter !== 'all' && data.month !== monthFilter) return;
                    if (statusFilter !== 'all' && data.status !== statusFilter) return;
                    
                    filteredPayments.push(data);
                    
                    totalAmount += Number(data.amount) || 0;
                    if (data.status === 'paid') completedAmount += Number(data.amount) || 0;
                    else if (data.status === 'pending') pendingAmount += Number(data.amount) || 0;
                });

                // Update stats
                document.getElementById("totalPayments").innerText = filteredPayments.length;
                document.getElementById("totalAmount").innerText = `₹${totalAmount}`;
                document.getElementById("completedAmount").innerText = `₹${completedAmount}`;
                document.getElementById("pendingAmount").innerText = `₹${pendingAmount}`;

                if (filteredPayments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No payments found</td></tr>';
                    return;
                }

                tbody.innerHTML = "";
                filteredPayments.forEach(payment => {
                    const row = document.createElement("tr");
                    
                    let statusClass = payment.status === 'paid' ? 'status-paid' : 'status-pending';
                    
                    row.innerHTML = `
                        <td>${payment.tenantName || 'N/A'}</td>
                        <td>${payment.room || 'N/A'}</td>
                        <td>${payment.month || 'N/A'}</td>
                        <td><strong>₹${payment.amount}</strong></td>
                        <td>${formatDate(payment.date)}</td>
                        <td><span class="status-badge ${statusClass}">${payment.status}</span></td>
                        <td>
                            ${payment.status === 'pending' 
                                ? `<button class="action-btn btn-paid" onclick="window.markAsPaid('${payment.id}', '${payment.tenantId}')">
                                     <i class="fas fa-check"></i> Mark Paid
                                   </button>`
                                : `<button class="action-btn btn-pending" onclick="window.markAsPending('${payment.id}', '${payment.tenantId}')">
                                     <i class="fas fa-undo"></i> Mark Pending
                                   </button>`
                            }
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error("Error loading payments:", error);
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ff6b6b;">Error: ${error.message}</td></tr>`;
            }
        }

        // Mark as paid
        window.markAsPaid = async (paymentId, tenantId) => {
            if (!confirm("Confirm this payment as paid?")) return;

            try {
                // Update payment record
                const paymentRef = doc(db, "rents", paymentId);
                await updateDoc(paymentRef, { status: "paid" });

                // Update tenant's current status (optional)
                const tenantRef = doc(db, "tenants", tenantId);
                await updateDoc(tenantRef, { status: "paid" });

                showMessage("✅ Payment marked as paid!", "success");
                loadPayments();

            } catch (error) {
                console.error("Error:", error);
                showMessage("❌ Error updating payment", "error");
            }
        };

        // Mark as pending (for corrections)
        window.markAsPending = async (paymentId, tenantId) => {
            if (!confirm("Mark this payment as pending again?")) return;

            try {
                // Update payment record
                const paymentRef = doc(db, "rents", paymentId);
                await updateDoc(paymentRef, { status: "pending" });

                // Update tenant's current status
                const tenantRef = doc(db, "tenants", tenantId);
                await updateDoc(tenantRef, { status: "pending" });

                showMessage("✅ Payment marked as pending!", "success");
                loadPayments();

            } catch (error) {
                console.error("Error:", error);
                showMessage("❌ Error updating payment", "error");
            }
        };

        // Auth check
        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById("loading");
            const accessDenied = document.getElementById("accessDenied");
            const mainContent = document.getElementById("mainContent");

            if (!user) {
                loading.style.display = "none";
                accessDenied.style.display = "block";
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (!userDoc.exists() || userDoc.data().role !== "admin") {
                    loading.style.display = "none";
                    accessDenied.style.display = "block";
                    return;
                }

                // Admin verified
                loading.style.display = "none";
                document.body.style.display = "block";
                mainContent.style.display = "block";
                
                currentUser = user;
                populateMonthFilter();
                loadPayments();

            } catch (error) {
                console.error("Auth error:", error);
                loading.innerHTML = "<p style='color:#ff6b6b;'>Authentication error</p>";
            }
        });

        // Fallback redirect
        setTimeout(() => {
            if (document.body.style.display !== "block") {
                window.location.href = "login.html";
            }
        }, 5000);

        // Event listeners
        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        document.getElementById("refreshBtn").addEventListener("click", loadPayments);
        document.getElementById("monthFilter").addEventListener("change", loadPayments);
        document.getElementById("statusFilter").addEventListener("change", loadPayments);

        // Make functions global
        window.markAsPaid = window.markAsPaid;
        window.markAsPending = window.markAsPending;
    </script>
</body>
</html>
