<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>RentFlow | Payment Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { max-width: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.15) 0%, transparent 40%),
                        linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            background-blend-mode: overlay;
            color: #ffffff;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
            display: none;
        }
        .payments-container { max-width: 1400px; margin: 0 auto; width: 100%; }
        .payments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
        }
        .header-left p { color: #b0d0ff; font-size: 0.9rem; }
        .header-right { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .admin-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .admin-btn:hover { border-color: #00b7ff; background: rgba(0, 183, 255, 0.1); transform: translateY(-2px); }
        .admin-btn.danger { background: rgba(255, 75, 75, 0.2); border-color: rgba(255, 75, 75, 0.4); }
        .admin-btn.danger:hover { background: rgba(255, 75, 75, 0.3); border-color: #ff4b4b; }
        
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0f1f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 1.3rem;
            color: #7bc9ff;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 183, 255, 0.3);
            border-top-color: #00b7ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .access-denied {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 75, 75, 0.3);
            border-radius: 30px;
            max-width: 500px;
            margin: 4rem auto;
        }
        .access-denied i { font-size: 4rem; color: #ff4b4b; margin-bottom: 1rem; }
        .access-denied h2 { font-family: 'Poppins', sans-serif; font-size: 2rem; margin-bottom: 1rem; color: #ff6b6b; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 20px;
            padding: 1.2rem;
        }
        .stat-icon { font-size: 1.8rem; color: #00b7ff; margin-bottom: 0.5rem; }
        .stat-label { color: #b0d0ff; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.5rem; font-weight: 600; font-family: 'Poppins', sans-serif; }
        
        /* Filters */
        .filters-section {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 2rem;
        }
        .filters-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; color: #7bc9ff; font-size: 1rem; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.8rem; }
        .filter-select {
            padding: 0.7rem 0.8rem;
            background: rgba(10, 20, 40, 0.8);
            border: 1px solid rgba(0, 183, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: #00b7ff; }
        
        /* Table Card */
        .table-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 25px;
            padding: 1.5rem;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .table-header h2 { font-family: 'Poppins', sans-serif; font-size: 1.3rem; }
        
        /* Desktop table styling – scrollable if needed */
        .table-container {
            overflow-x: auto;
            border-radius: 15px;
            background: rgba(10, 20, 40, 0.5);
            border: 1px solid rgba(0, 183, 255, 0.15);
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        td {
    word-break: break-word;
    overflow-wrap: break-word;
}
        th {
            text-align: left;
            padding: 0.8rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
            font-size: 0.85rem;
        }
        td {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
            font-size: 0.85rem;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        tr:hover td { background: rgba(0, 183, 255, 0.05); }
        .status-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem; font-weight: 500; }
        .status-paid { background: rgba(92, 255, 157, 0.2); color: #5cff9d; border: 1px solid rgba(92, 255, 157, 0.3); }
        .status-pending { background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3); }
        .action-btn {
            padding: 0.3rem 0.6rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 0.2rem;
            border: none;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-paid { background: rgba(92, 255, 157, 0.2); color: #5cff9d; border: 1px solid #5cff9d; }
        .btn-pending { background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px solid #ffd700; }
        .btn-receipt { background: rgba(123, 201, 255, 0.2); color: #7bc9ff; border: 1px solid #7bc9ff; }
        .btn-receipt:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.2); }
        
        .message {
            padding: 0.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        .message.success { background: rgba(92, 255, 157, 0.1); border: 1px solid #5cff9d; color: #5cff9d; }
        .message.error { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff6b6b; }
        .message.info { background: rgba(123, 201, 255, 0.1); border: 1px solid #7bc9ff; color: #7bc9ff; }
        
        /* Mobile breakpoints */
        @media (max-width: 768px) {

    body {
        padding: 1rem;
        overflow-x: hidden;
    }

    .payments-container {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
    }

    .payments-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .header-right {
        width: 100%;
        flex-direction: column;
    }

    .admin-btn {
        width: 100%;
        justify-content: center;
    }

    .stats-grid {
        grid-template-columns: 1fr;
    }

    .filters-grid {
        grid-template-columns: 1fr;
    }

    .table-card {
        padding: 1rem;
        border-radius: 22px;
        overflow: hidden;
    }

    .table-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
    }

    .table-header h2 {
        font-size: 1.3rem;
    }

    /* REMOVE HORIZONTAL SCROLL */
    .table-container {
        overflow-x: visible;
        width: 100%;
    }

    table,
    thead,
    tbody,
    th,
    td,
    tr {
        display: block;
        width: 100%;
    }

    thead {
        display: none;
    }

    tbody {
        width: 100%;
    }

    tr {
        background: rgba(10, 20, 40, 0.65);
        border: 1px solid rgba(0, 183, 255, 0.2);
        border-radius: 20px;
        margin-bottom: 1rem;
        padding: 1rem;
        width: 100%;
    }

    td {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        padding: 0.8rem 0;
        border-bottom: 1px solid rgba(0, 183, 255, 0.1);
        font-size: 0.85rem;
        word-break: break-word;
        overflow-wrap: break-word;
    }

    td:last-child {
        border-bottom: none;
    }

    td::before {
        width: 42%;
        flex-shrink: 0;
        font-weight: 600;
        color: #7bc9ff;
    }

    td:nth-child(1)::before { content: "Tenant"; }
    td:nth-child(2)::before { content: "Room"; }
    td:nth-child(3)::before { content: "Month"; }
    td:nth-child(4)::before { content: "Amount"; }
    td:nth-child(5)::before { content: "Date"; }
    td:nth-child(6)::before { content: "Status"; }
    td:nth-child(7)::before { content: "Actions"; }

    .action-buttons-cell {
        flex-direction: column;
        align-items: stretch;
        gap: 0.6rem;
    }

    .action-btn {
        width: 100%;
        justify-content: center;
        margin: 0;
        padding: 0.65rem;
        font-size: 0.78rem;
    }

    .status-badge {
        font-size: 0.75rem;
        padding: 0.3rem 0.7rem;
    }
}
        }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div>Checking authorization...</div></div>
    <div class="payments-container">
        <div class="payments-header">
            <div class="header-left">
                <h1><i class="fas fa-credit-card"></i> Payment Management</h1>
                <p>Track and manage all tenant payments</p>
            </div>
            <div class="header-right">
                <a href="admin.html" class="admin-btn"><i class="fas fa-arrow-left"></i> Back to Admin</a>
                <button class="admin-btn danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        <div id="message" class="message"></div>
        <div id="accessDenied" style="display: none;">
            <div class="access-denied">
                <i class="fas fa-shield-alt"></i>
                <h2>Access Denied</h2>
                <p>Admin privileges required.</p>
                <a href="login.html" class="admin-btn" style="display: inline-block;"><i class="fas fa-sign-in-alt"></i> Go to Login</a>
            </div>
        </div>
        <div id="mainContent" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-credit-card"></i></div><div class="stat-label">Total Payments</div><div class="stat-value" id="totalPayments">0</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-rupee-sign"></i></div><div class="stat-label">Total Amount</div><div class="stat-value" id="totalAmount">₹0</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-label">Completed</div><div class="stat-value" id="completedAmount">₹0</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-label">Pending</div><div class="stat-value" id="pendingAmount">₹0</div></div>
            </div>
            <div class="filters-section">
                <div class="filters-title"><i class="fas fa-filter"></i><span>Filter Payments</span></div>
                <div class="filters-grid">
                    <select id="monthFilter" class="filter-select"></select>
                    <select id="statusFilter" class="filter-select">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="paid">Paid</option>
                    </select>
                </div>
            </div>
            <div class="table-card">
                <div class="table-header"><h2><i class="fas fa-list"></i> All Payments</h2><button class="admin-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button></div>
                <div class="table-container">
                    <table id="paymentsTable">
                        <thead>
                            <tr>
                                <th>Tenant</th>
                                <th>Room</th>
                                <th>Month</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, getDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
        }
        function formatDate(date) {
            if (!date) return 'N/A';
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function populateMonthFilter() {
            const months = [];
            const now = new Date();
            for (let i = 0; i < 6; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push(d.toLocaleString('default', { month: 'long', year: 'numeric' }));
            }
            const select = document.getElementById('monthFilter');
            select.innerHTML = '<option value="all">All Months</option>';
            months.forEach(month => { select.innerHTML += `<option value="${month}">${month}</option>`; });
        }

        async function loadPayments() {
            const tbody = document.getElementById("paymentsTableBody");
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">Loading payments...</td></tr>';
            try {
                const monthFilter = document.getElementById('monthFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;
                let q = query(collection(db, "rents"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                let filteredPayments = [], totalAmount = 0, completedAmount = 0, pendingAmount = 0;
                querySnapshot.forEach(docSnap => {
                    const data = { id: docSnap.id, ...docSnap.data() };
                    if (monthFilter !== 'all' && data.month !== monthFilter) return;
                    if (statusFilter !== 'all' && data.status !== statusFilter) return;
                    filteredPayments.push(data);
                    totalAmount += Number(data.amount) || 0;
                    if (data.status === 'paid') completedAmount += Number(data.amount) || 0;
                    else if (data.status === 'pending') pendingAmount += Number(data.amount) || 0;
                });
                document.getElementById("totalPayments").innerText = filteredPayments.length;
                document.getElementById("totalAmount").innerText = `₹${totalAmount}`;
                document.getElementById("completedAmount").innerText = `₹${completedAmount}`;
                document.getElementById("pendingAmount").innerText = `₹${pendingAmount}`;
                if (filteredPayments.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No payments found</td></tr>'; return; }
                tbody.innerHTML = "";
                filteredPayments.forEach(payment => {
                    const row = document.createElement("tr");
                    let statusClass = payment.status === 'paid' ? 'status-paid' : 'status-pending';
                    const isPaid = payment.status === 'paid';
                    const receiptGenerated = payment.receiptGenerated === true;
                    // data-label attributes for mobile card layout
                    row.innerHTML = `
                        <td data-label="Tenant">${payment.tenantName || 'N/A'}</td>
                        <td data-label="Room">${payment.room || 'N/A'}</td>
                        <td data-label="Month">${payment.month || 'N/A'}</td>
                        <td data-label="Amount"><strong>₹${payment.amount}</strong></td>
                        <td data-label="Date">${formatDate(payment.date)}</td>
                        <td data-label="Status"><span class="status-badge ${statusClass}">${payment.status}</span></td>
                        <td data-label="Actions" class="action-buttons-cell">
                            ${!isPaid ? `<button class="action-btn btn-paid" data-id="${payment.id}" data-tenant="${payment.tenantId}" data-action="markPaid"><i class="fas fa-check"></i> Mark Paid</button>` : ''}
                            ${isPaid && !receiptGenerated ? `<button class="action-btn btn-receipt" data-id="${payment.id}" data-tenant="${payment.tenantId}" data-action="generateReceipt"><i class="fas fa-file-invoice"></i> Generate Receipt</button>` : ''}
                            ${isPaid && receiptGenerated ? `<span style="color:#5cff9d;"><i class="fas fa-check-circle"></i> Receipt Generated</span>` : ''}
                            ${isPaid && !receiptGenerated ? `<button class="action-btn btn-pending" data-id="${payment.id}" data-tenant="${payment.tenantId}" data-action="markPending"><i class="fas fa-undo"></i> Mark Pending</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                // Attach event listeners dynamically
                document.querySelectorAll('.action-btn').forEach(btn => {
                    btn.removeEventListener('click', handleAction);
                    btn.addEventListener('click', handleAction);
                });
            } catch (error) { console.error(error); tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ff6b6b;">Error: ${error.message}</td></tr>`; }
        }

        async function handleAction(e) {
            const btn = e.currentTarget;
            const action = btn.dataset.action;
            const paymentId = btn.dataset.id;
            const tenantId = btn.dataset.tenant;
            if (action === 'markPaid') {
                if (!confirm("Confirm this payment as paid?")) return;
                try {
                    const paymentRef = doc(db, "rents", paymentId);
                    await updateDoc(paymentRef, { status: "paid", receiptGenerated: false });
                    const tenantRef = doc(db, "tenants", tenantId);
                    await updateDoc(tenantRef, { status: "paid" });
                    showMessage("✅ Payment marked as paid! You can now generate receipt.", "success");
                    loadPayments();
                } catch (error) { showMessage("❌ Error: " + error.message, "error"); }
            } else if (action === 'generateReceipt') {
                if (!confirm("⚠️ Generate receipt for this payment? This action will finalize the receipt and cannot be undone. Tenant will be able to download the receipt.")) return;
                try {
                    const paymentRef = doc(db, "rents", paymentId);
                    await updateDoc(paymentRef, { receiptGenerated: true, receiptGeneratedAt: new Date() });
                    showMessage("✅ Receipt generated! Tenant can now download it.", "success");
                    loadPayments();
                } catch (error) { showMessage("❌ Error: " + error.message, "error"); }
            } else if (action === 'markPending') {
                if (!confirm("Mark this payment as pending again? This will revert the status.")) return;
                try {
                    const paymentRef = doc(db, "rents", paymentId);
                    await updateDoc(paymentRef, { status: "pending", receiptGenerated: false });
                    const tenantRef = doc(db, "tenants", tenantId);
                    await updateDoc(tenantRef, { status: "pending" });
                    showMessage("✅ Payment marked as pending.", "success");
                    loadPayments();
                } catch (error) { showMessage("❌ Error: " + error.message, "error"); }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById("loading");
            const accessDenied = document.getElementById("accessDenied");
            const mainContent = document.getElementById("mainContent");
            if (!user) { loading.style.display = "none"; accessDenied.style.display = "block"; return; }
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists() || userDoc.data().role !== "admin") { loading.style.display = "none"; accessDenied.style.display = "block"; return; }
                loading.style.display = "none";
                document.body.style.display = "block";
                mainContent.style.display = "block";
                currentUser = user;
                populateMonthFilter();
                await loadPayments();
            } catch (error) { console.error(error); loading.innerHTML = "<p style='color:#ff6b6b;'>Authentication error</p>"; }
        });
        setTimeout(() => { if (document.body.style.display !== "block") window.location.href = "login.html"; }, 5000);
        document.getElementById("logoutBtn").addEventListener("click", () => { signOut(auth).then(() => window.location.href = "login.html"); });
        document.getElementById("refreshBtn").addEventListener("click", loadPayments);
        document.getElementById("monthFilter").addEventListener("change", loadPayments);
        document.getElementById("statusFilter").addEventListener("change", loadPayments);
    </script>
</body>
</html>
