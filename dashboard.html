<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentFlow | Tenant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .header-left p {
            color: #b0d0ff;
            font-size: 1rem;
        }

        .header-right {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-btn:hover {
            border-color: #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            transform: translateY(-2px);
        }

        .header-btn.logout {
            background: rgba(255, 75, 75, 0.2);
            border-color: rgba(255, 75, 75, 0.4);
        }

        .header-btn.logout:hover {
            background: rgba(255, 75, 75, 0.3);
            border-color: #ff4b4b;
        }

        /* Main Card */
        .main-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 40px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 183, 255, 0.1);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: #7bc9ff;
            font-size: 1.2rem;
        }

        .loading i {
            margin-right: 0.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Tenant Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-item {
            background: rgba(10, 20, 40, 0.5);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 183, 255, 0.15);
            transition: all 0.3s ease;
        }

        .info-item:hover {
            border-color: #00b7ff;
            box-shadow: 0 10px 30px rgba(0, 183, 255, 0.1);
        }

        .info-label {
            color: #b0d0ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-label i {
            color: #00b7ff;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
        }

        .status-badge.paid {
            background: rgba(92, 255, 157, 0.2);
            color: #5cff9d;
            border: 1px solid rgba(92, 255, 157, 0.3);
        }

        .status-badge.pending {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .status-badge.overdue {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1 1 200px;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .pay-btn {
            background: linear-gradient(135deg, #00b7ff, #3e9cff);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 183, 255, 0.4);
        }

        .pay-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 183, 255, 0.6);
        }

        .receipt-btn {
            background: rgba(123, 201, 255, 0.2);
            border: 1px solid #00b7ff;
            color: white;
        }

        .receipt-btn:hover {
            background: rgba(0, 183, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Payment History */
        .history-section {
            margin-top: 2.5rem;
        }

        .history-section h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-section h3 i {
            color: #00b7ff;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(10, 20, 40, 0.5);
            border: 1px solid rgba(0, 183, 255, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th {
            text-align: left;
            padding: 1.2rem 1rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
        }

        tr:hover td {
            background: rgba(0, 183, 255, 0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .main-card {
                padding: 1.5rem;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-right {
                width: 100%;
            }
            
            .header-btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="header-left">
                <h1><i class="fas fa-home"></i> Tenant Dashboard</h1>
                <p>Manage your rent and payments</p>
            </div>
            <div class="header-right">
                <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="header-btn logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="main-card">
            <div id="loadingMessage" class="loading">
                <i class="fas fa-spinner"></i> Loading your dashboard...
            </div>
            
            <div id="content" style="display: none;">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-user"></i> Tenant Name</div>
                        <div class="info-value" id="tenantName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-door-open"></i> Room Number</div>
                        <div class="info-value" id="roomNumber">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-rupee-sign"></i> Monthly Rent</div>
                        <div class="info-value" id="rentAmount">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-clock"></i> Status</div>
                        <div class="info-value" id="paymentStatus">-</div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn pay-btn" id="payRentBtn">
                        <i class="fas fa-credit-card"></i> Pay Rent Now
                    </button>
                    <button class="action-btn receipt-btn" id="downloadReceiptBtn">
                        <i class="fas fa-file-pdf"></i> Download Receipt
                    </button>
                </div>

                <div class="history-section">
                    <h3><i class="fas fa-history"></i> Payment History</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="paymentHistory">
                                <tr>
                                    <td colspan="3" style="text-align: center; color: #b0d0ff;">No payment history available</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Load tenant data
        async function loadTenantData(user) {
            try {
                const tenantRef = doc(db, "tenants", user.uid);
                const tenantSnap = await getDoc(tenantRef);

                document.getElementById("loadingMessage").style.display = "none";
                document.getElementById("content").style.display = "block";

                if (!tenantSnap.exists()) {
                    document.getElementById("tenantName").innerText = "Data not found";
                    return;
                }

                const data = tenantSnap.data();
                
                document.getElementById("tenantName").innerText = data.name || "Not set";
                document.getElementById("roomNumber").innerText = data.room || "Not assigned";
                document.getElementById("rentAmount").innerText = "₹" + (data.rent || "0");
                
                const status = data.status || "pending";
                let statusHTML = '';
                
                if (status.toLowerCase().includes("paid")) {
                    statusHTML = '<span class="status-badge paid"><i class="fas fa-check-circle"></i> Paid</span>';
                } else if (status.toLowerCase().includes("pending")) {
                    statusHTML = '<span class="status-badge pending"><i class="fas fa-clock"></i> Pending</span>';
                } else if (status.toLowerCase().includes("overdue")) {
                    statusHTML = '<span class="status-badge overdue"><i class="fas fa-exclamation-triangle"></i> Overdue</span>';
                } else {
                    statusHTML = `<span>${status}</span>`;
                }
                
                document.getElementById("paymentStatus").innerHTML = statusHTML;

                // Load payment history
                await loadPaymentHistory(user.uid);

            } catch (err) {
                console.error("Error:", err);
                document.getElementById("loadingMessage").innerHTML = "❌ Error loading data. Please refresh.";
                document.getElementById("loadingMessage").style.color = "#ff6b6b";
            }
        }

        // Load payment history
        async function loadPaymentHistory(userId) {
            const historyTable = document.getElementById("paymentHistory");
            historyTable.innerHTML = "";

            const q = query(
                collection(db, "payments"), 
                where("tenantId", "==", userId),
                orderBy("date", "desc")
            );

            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                historyTable.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #b0d0ff;">No payment history available</td></tr>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const row = document.createElement("tr");
                
                let statusClass = '';
                if (data.status === 'completed') statusClass = 'paid';
                else if (data.status === 'pending') statusClass = 'pending';
                else statusClass = 'overdue';
                
                row.innerHTML = `
                    <td>${new Date(data.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                    <td>₹${data.amount}</td>
                    <td><span class="status-badge ${statusClass}" style="padding: 0.3rem 0.8rem;">${data.status}</span></td>
                `;
                historyTable.appendChild(row);
            });
        }

        // Auth state
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            await loadTenantData(user);
        });

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        // Refresh
        document.getElementById("refreshBtn").addEventListener("click", () => {
            if (auth.currentUser) {
                loadTenantData(auth.currentUser);
            }
        });

        // Pay Rent
        document.getElementById("payRentBtn").addEventListener("click", async () => {
            const amountText = document.getElementById("rentAmount").innerText;
            const amount = amountText.replace("₹", "").trim();
            const user = auth.currentUser;

            const upiID = "adityanesur@ybl";
            const upiLink = `upi://pay?pa=${upiID}&pn=RentFlow&am=${amount}&cu=INR`;

            // Save payment request
            await addDoc(collection(db, "payments"), {
                tenantId: user.uid,
                amount: Number(amount),
                date: new Date(),
                status: "pending"
            });

            // Show QR
            const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}`;
            const qrWindow = window.open("", "_blank");
            
            qrWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Pay Rent - QR Code</title>
                    <style>
                        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0f1f, #030614); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
                        .qr-container { background: rgba(18, 25, 45, 0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(0, 183, 255, 0.2); text-align: center; max-width: 400px; }
                        h2 { background: linear-gradient(135deg, #ffffff, #7bc9ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
                        img { border-radius: 20px; padding: 10px; background: white; margin: 20px 0; }
                        .amount { font-size: 24px; color: #00b7ff; margin: 10px 0; }
                        .note { color: #888; font-size: 14px; margin-top: 20px; }
                    </style>
                </head>
                <body>
                    <div class="qr-container">
                        <h2>✨ Scan to Pay Rent</h2>
                        <img src="${qrLink}" alt="Payment QR Code">
                        <div class="amount">Amount: ₹${amount}</div>
                        <p>Scan with any UPI app</p>
                        <div class="note">QR code expires in 15 minutes</div>
                    </div>
                </body>
                </html>
            `);
        });

        // Download Receipt
        document.getElementById("downloadReceiptBtn").addEventListener("click", () => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            const tenantName = document.getElementById("tenantName").innerText;
            const room = document.getElementById("roomNumber").innerText;
            const amount = document.getElementById("rentAmount").innerText;
            const status = document.getElementById("paymentStatus").innerText.replace(/[✅⏳⚠️]/g, '').trim();
            const date = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });

            pdf.setFillColor(10, 20, 40);
            pdf.rect(0, 0, 210, 297, 'F');

            pdf.setTextColor(0, 183, 255);
            pdf.setFontSize(24);
            pdf.setFont("helvetica", "bold");
            pdf.text("RENT RECEIPT", 105, 30, { align: "center" });

            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(12);
            pdf.setFont("helvetica", "normal");
            
            pdf.text(`Tenant Name: ${tenantName}`, 20, 60);
            pdf.text(`Room Number: ${room}`, 20, 70);
            pdf.text(`Amount Paid: ${amount}`, 20, 80);
            pdf.text(`Date: ${date}`, 20, 90);
            pdf.text(`Status: ${status}`, 20, 100);
            
            pdf.text("Thank you for your payment!", 105, 150, { align: "center" });

            pdf.save(`rent_receipt_${date.replace(/\s/g, '_')}.pdf`);
        });
    </script>
</body>
</html>
