<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Inter;
            background: linear-gradient(160deg, #0b0f1c, #03050b);
            color: white;
            min-height: 100vh;
            padding: 40px;
            margin: 0;
        }

        .card {
            max-width: 600px;
            margin: auto;
            background: rgba(18, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 2rem;
            border: 1px solid rgba(110, 180, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 183, 255, 0.2);
        }

        h2 {
            font-family: Poppins;
            background: linear-gradient(90deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .stat {
            margin-bottom: 20px;
            font-size: 18px;
            padding: 10px;
            border-bottom: 1px solid rgba(110, 180, 255, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #00b7ff, #3e9cff);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.5);
        }

        #logoutBtn {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
        }

        .loading {
            text-align: center;
            color: #7bc9ff;
            margin: 20px 0;
        }

        .error-box {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ Tenant Dashboard</h2>
        <div id="loadingMessage" class="loading">Loading your data...</div>
        <div id="content" style="display: none;">
            <div class="stat" id="tenantName">Tenant: </div>
            <div class="stat" id="roomNumber">Room: </div>
            <div class="stat" id="rentAmount">Rent Due: </div>
            <div class="stat" id="paymentStatus">Status: </div>
            <div class="button-group">
                <button id="payRentBtn">Pay Rent</button>
                <button id="logoutBtn">Logout</button>
            </div>
            <h3>Payment History</h3>

<table style="width:100%; margin-top:15px;">

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="paymentHistory"></tbody>

</table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Add a small delay to ensure auth state is fully initialized
        setTimeout(() => {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    console.log("No user found, redirecting to login...");
                    window.location.href = "login.html";
                    loadPaymentHistory(user.uid);
                    return;
                }

                try {
                    console.log("User found:", user.uid);
                    console.log("Fetching tenant data...");
                    
                    const tenantRef = doc(db, "tenants", user.uid);
                    const tenantSnap = await getDoc(tenantRef);

                    // Hide loading, show content
                    document.getElementById("loadingMessage").style.display = "none";
                    document.getElementById("content").style.display = "block";

                    if (!tenantSnap.exists()) {
                        document.getElementById("tenantName").innerText = "Tenant: Data not found";
                        document.getElementById("roomNumber").innerText = "Room: Not assigned";
                        document.getElementById("rentAmount").innerText = "Rent Due: ₹0";
                        document.getElementById("paymentStatus").innerText = "Status: No data";
                        return;
                    }

                    const data = tenantSnap.data();
                    console.log("Tenant data:", data); // Debug: see what fields exist
                    
                    // FIXED: Using correct field names from Firestore
                    // Your database has: name, rent, room, status
                    document.getElementById("tenantName").innerText = "Tenant: " + (data.name || "Not set");
                    document.getElementById("roomNumber").innerText = "Room: " + (data.room || "Not assigned");  // ← Changed from roomId to room
                    document.getElementById("rentAmount").innerText = "Rent Due: ₹" + (data.rent || "0");
                    
                    // Format status with emoji
                    const status = data.status || "Unknown";
                    let statusEmoji = "❓";
                    let statusColor = "#ffffff";
                    
                    if (status.toLowerCase().includes("paid")) {
                        statusEmoji = "✅";
                        statusColor = "#5cff9d";
                    } else if (status.toLowerCase().includes("pending")) {
                        statusEmoji = "⏳";
                        statusColor = "#ffd700";
                    } else if (status.toLowerCase().includes("overdue")) {
                        statusEmoji = "⚠️";
                        statusColor = "#ff6b6b";
                    }
                    
                    const statusElement = document.getElementById("paymentStatus");
                    statusElement.innerText = "Status: " + statusEmoji + " " + status;
                    statusElement.style.color = statusColor;

                } catch (err) {
                    console.error("Error loading data:", err);
                    document.getElementById("loadingMessage").innerHTML = "❌ Error loading data. Please try again.";
                    document.getElementById("loadingMessage").style.color = "#ff6b6b";
                }
            });
        }, 500);

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Logout error:", error);
            });
        });
        
        document.getElementById("payRentBtn").addEventListener("click", async () => {

const amount = document
.getElementById("rentAmount")
.innerText.replace("Rent Due: ₹","")
.trim();

const user = auth.currentUser;

const upiID = "adityanesur@ybl";  // replace this
const name = "RentFlow";

const upiLink =
`upi://pay?pa=${upiID}&pn=${name}&am=${amount}&cu=INR`;

// Save payment request
await addDoc(collection(db,"payments"),{

tenantId: user.uid,
amount: Number(amount),
date: new Date(),
status: "pending"

});

// Show QR code
showQRCode(upiLink, amount);

});
        
        function showQRCode(upiLink, amount) {
            const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}`;
            
            const qrWindow = window.open("", "_blank");
            
            qrWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Pay Rent - QR Code</title>
                    <style>
                        body {
                            font-family: 'Inter', Arial, sans-serif;
                            background: linear-gradient(160deg, #0b0f1c, #03050b);
                            color: white;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            min-height: 100vh;
                            margin: 0;
                            padding: 20px;
                        }
                        .qr-container {
                            background: rgba(18, 25, 45, 0.6);
                            backdrop-filter: blur(12px);
                            padding: 40px;
                            border-radius: 2rem;
                            border: 1px solid rgba(110, 180, 255, 0.2);
                            text-align: center;
                            max-width: 400px;
                        }
                        h2 {
                            background: linear-gradient(90deg, #ffffff, #7bc9ff);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            margin-bottom: 20px;
                        }
                        img {
                            border-radius: 20px;
                            padding: 10px;
                            background: white;
                            margin: 20px 0;
                        }
                        .amount {
                            font-size: 24px;
                            color: #7bc9ff;
                            margin: 10px 0;
                        }
                        .note {
                            color: #888;
                            font-size: 14px;
                            margin-top: 20px;
                        }
                    </style>
                </head>
                <body>
                    <div class="qr-container">
                        <h2>✨ Scan to Pay Rent</h2>
                        <img src="${qrLink}" alt="Payment QR Code">
                        <div class="amount">Amount: ₹${amount}</div>
                        <p>Scan with any UPI app:<br>Google Pay • PhonePe • Paytm</p>
                        <div class="note">QR code expires in 15 minutes</div>
                    </div>
                </body>
                </html>
            `);
        }
        async function loadPaymentHistory(userId){

const historyTable = document.getElementById("paymentHistory");

historyTable.innerHTML = "";

const q = query(collection(db,"payments"), where("tenantId","==",userId));

const querySnapshot = await getDocs(q);

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const row = document.createElement("tr");

row.innerHTML = `

<td>${new Date(data.date).toLocaleDateString()}</td>
<td>₹${data.amount}</td>
<td>${data.status}</td>

`;

historyTable.appendChild(row);

});

}
    </script>
</body>
</html>
