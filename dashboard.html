<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tenant Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(160deg,#0b0f1c,#03050b);
color:white;
min-height:100vh;
padding:40px;
}

.card{

max-width:600px;
margin:auto;

background:rgba(18,25,45,0.6);
backdrop-filter:blur(12px);

padding:40px;

border-radius:2rem;

border:1px solid rgba(110,180,255,0.2);

box-shadow:0 0 30px rgba(0,183,255,0.2);
}

h2{

font-family:Poppins;

background:linear-gradient(90deg,#ffffff,#7bc9ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:30px;
}

.stat{

margin-bottom:20px;
font-size:18px;

}

button{

margin-top:20px;

padding:12px 20px;

border:none;

border-radius:30px;

background:linear-gradient(135deg,#00b7ff,#3e9cff);

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h2>Tenant Dashboard</h2>

<div class="stat" id="tenantName">Tenant: Loading...</div>

<div class="stat" id="roomNumber">Room: Loading...</div>

<div class="stat" id="rentAmount">Rent Due: Loading...</div>

<div class="stat" id="paymentStatus">Status: Loading...</div>

<button id="logoutBtn">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
authDomain: "rent-management-system-86ccc.firebaseapp.com",
projectId: "rent-management-system-86ccc",
storageBucket: "rent-management-system-86ccc.appspot.com",
messagingSenderId: "676999561040",
appId: "1:676999561040:web:f1166d818a33c5a008f655"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(user){

console.log("User UID:", user.uid);

const docRef = doc(db,"tenant",user.uid);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const data = docSnap.data();

document.getElementById("tenantName").innerText="Tenant: "+data.name;
document.getElementById("roomNumber").innerText="Room: "+data.room;
document.getElementById("rentAmount").innerText="Rent Due: ₹"+data.rent;
document.getElementById("paymentStatus").innerText="Status: "+data.status;

}else{

console.log("No tenant data found");

}

}else{

window.location.href="login.html";

}

});

document.getElementById("logoutBtn").addEventListener("click",()=>{

signOut(auth).then(()=>{
window.location.href="login.html";
});

});

</script>

</body>


</html>
