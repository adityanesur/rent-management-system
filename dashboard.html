<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentFlow | Tenant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .header-left p {
            color: #b0d0ff;
        }

        .header-right {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-btn:hover {
            border-color: #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            transform: translateY(-2px);
        }

        .header-btn.logout {
            background: rgba(255, 75, 75, 0.2);
            border-color: rgba(255, 75, 75, 0.4);
        }

        .header-btn.logout:hover {
            background: rgba(255, 75, 75, 0.3);
            border-color: #ff4b4b;
        }

        .main-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 40px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 183, 255, 0.1);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: #7bc9ff;
            font-size: 1.2rem;
        }

        .loading i {
            margin-right: 0.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-item {
            background: rgba(10, 20, 40, 0.5);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 183, 255, 0.15);
            transition: all 0.3s ease;
        }

        .info-item:hover {
            border-color: #00b7ff;
            box-shadow: 0 10px 30px rgba(0, 183, 255, 0.1);
        }

        .info-label {
            color: #b0d0ff;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-label i {
            color: #00b7ff;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-badge.paid {
            background: rgba(92, 255, 157, 0.15);
            color: #5cff9d;
            border: 1px solid rgba(92, 255, 157, 0.3);
        }

        .status-badge.pending {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1 1 250px;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .pay-btn {
            background: linear-gradient(135deg, #00b7ff, #3e9cff);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 183, 255, 0.3);
        }

        .pay-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 183, 255, 0.5);
        }

        .pay-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: linear-gradient(135deg, #4a5568, #2d3748);
        }

        .history-section {
            margin-top: 2.5rem;
        }

        .history-section h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-section h3 i {
            color: #00b7ff;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(10, 20, 40, 0.5);
            border: 1px solid rgba(0, 183, 255, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: left;
            padding: 1.2rem 1rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
        }

        tr:hover td {
            background: rgba(0, 183, 255, 0.05);
        }

        .receipt-download-btn {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 1px solid #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .receipt-download-btn:hover {
            background: rgba(0, 183, 255, 0.3);
            transform: translateY(-2px);
        }

        .month-badge {
            background: rgba(0, 183, 255, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #7bc9ff;
        }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: #b0d0ff;
        }

        .no-data i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .main-card { padding: 1.5rem; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="header-left">
                <h1><i class="fas fa-home"></i> Tenant Dashboard</h1>
                <p>Manage your rent and payments</p>
            </div>
            <div class="header-right">
                <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="header-btn logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="main-card">
            <div id="loadingMessage" class="loading">
                <i class="fas fa-spinner"></i> Loading your dashboard...
            </div>
            
            <div id="content" style="display: none;">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-user"></i> TENANT NAME</div>
                        <div class="info-value" id="tenantName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-door-open"></i> ROOM NUMBER</div>
                        <div class="info-value" id="roomNumber">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-rupee-sign"></i> MONTHLY RENT</div>
                        <div class="info-value" id="rentAmount">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-calendar"></i> CURRENT MONTH</div>
                        <div class="info-value" id="currentMonth">-</div>
                    </div>
                </div>

                <!-- Status Card -->
                <div style="background: rgba(0, 183, 255, 0.05); border-radius: 20px; padding: 1.5rem; margin: 1.5rem 0; border: 1px solid rgba(0, 183, 255, 0.2);">
                    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
                        <div>
                            <div style="color: #b0d0ff; font-size: 0.9rem; margin-bottom: 0.3rem;">CURRENT MONTH STATUS</div>
                            <div id="paymentStatusDisplay" style="font-size: 1.8rem; font-weight: 600;"></div>
                        </div>
                        <button class="action-btn pay-btn" id="payRentBtn">
                            <i class="fas fa-credit-card"></i> Pay Rent Now
                        </button>
                    </div>
                </div>

                <div class="history-section">
                    <h3><i class="fas fa-history"></i> Payment History</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Receipt</th>
                                </tr>
                            </thead>
                            <tbody id="paymentHistory">
                                <tr>
                                    <td colspan="4" class="no-data">
                                        <i class="fas fa-inbox"></i>
                                        <p>No payment history available</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Get current month
        const now = new Date();
        const currentMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });
        document.getElementById("currentMonth").innerText = currentMonth;

        // Load tenant data
        async function loadTenantData(user) {
            try {
                const tenantRef = doc(db, "tenants", user.uid);
                const tenantSnap = await getDoc(tenantRef);

                document.getElementById("loadingMessage").style.display = "none";
                document.getElementById("content").style.display = "block";

                if (!tenantSnap.exists()) {
                    document.getElementById("tenantName").innerText = "Data not found";
                    return;
                }

                const data = tenantSnap.data();
                
                document.getElementById("tenantName").innerText = data.name || "Not set";
                document.getElementById("roomNumber").innerText = data.room || "Not assigned";
                document.getElementById("rentAmount").innerText = "₹" + (data.rent || "0");

                // Get current month's rent status from rents collection
                const rentQuery = query(
                    collection(db, "rents"),
                    where("tenantId", "==", user.uid),
                    where("month", "==", currentMonth)
                );
                const rentSnap = await getDocs(rentQuery);
                
                let currentStatus = "pending";
                let rentId = null;
                
                if (!rentSnap.empty) {
                    currentStatus = rentSnap.docs[0].data().status;
                    rentId = rentSnap.docs[0].id;
                }

                // Update tenant's status in tenants collection for admin view
                await updateDoc(tenantRef, { status: currentStatus });

                // Update UI based on status
                const payRentBtn = document.getElementById("payRentBtn");
                const statusDisplay = document.getElementById("paymentStatusDisplay");
                
                if (currentStatus === "paid") {
                    payRentBtn.disabled = true;
                    payRentBtn.innerHTML = `<i class="fas fa-check-circle"></i> Paid for ${currentMonth}`;
                    statusDisplay.innerHTML = '<span class="status-badge paid"><i class="fas fa-check-circle"></i> PAID</span>';
                } else {
                    payRentBtn.disabled = false;
                    payRentBtn.innerHTML = `<i class="fas fa-credit-card"></i> Pay Rent for ${currentMonth}`;
                    statusDisplay.innerHTML = '<span class="status-badge pending"><i class="fas fa-clock"></i> PENDING</span>';
                }

                // Load payment history
                await loadPaymentHistory(user.uid);

            } catch (err) {
                console.error("Error:", err);
                document.getElementById("loadingMessage").innerHTML = "❌ Error loading data. Please refresh.";
                document.getElementById("loadingMessage").style.color = "#ff6b6b";
            }
        }

        // Load payment history
        async function loadPaymentHistory(userId) {
            const historyTable = document.getElementById("paymentHistory");
            historyTable.innerHTML = "";

            const q = query(
                collection(db, "rents"), 
                where("tenantId", "==", userId),
                orderBy("date", "desc")
            );

            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                historyTable.innerHTML = '<tr><td colspan="4" class="no-data"><i class="fas fa-inbox"></i><p>No payment history available</p></td></tr>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const row = document.createElement("tr");
                
                let statusClass = data.status === 'paid' ? 'paid' : 'pending';
                let statusText = data.status === 'paid' ? 'Paid' : 'Pending';
                
                // Format date if exists
                const paymentDate = data.date ? new Date(data.date.seconds * 1000).toLocaleDateString('en-IN', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                }) : 'N/A';
                
                row.innerHTML = `
                    <td>
                        ${data.month || 'N/A'}
                        ${data.status === 'paid' ? `<span class="month-badge">${paymentDate}</span>` : ''}
                    </td>
                    <td>₹${data.amount || '0'}</td>
                    <td><span class="status-badge ${statusClass}" style="padding: 0.3rem 1rem;">${statusText}</span></td>
                    <td>
                        ${data.status === "paid" 
                            ? `<button class="receipt-download-btn" 
                                data-name="${document.getElementById("tenantName").innerText}"
                                data-room="${document.getElementById("roomNumber").innerText}"
                                data-amount="${data.amount}"
                                data-month="${data.month}"
                                data-date="${paymentDate}">
                                <i class="fas fa-download"></i> Download Receipt
                              </button>` 
                            : `<span style="color:#4a5568;">—</span>`}
                    </td>
                `;
                historyTable.appendChild(row);
            });
        }

        // Auth state
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            await loadTenantData(user);
        });

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        // Refresh
        document.getElementById("refreshBtn").addEventListener("click", () => {
            if (auth.currentUser) {
                loadTenantData(auth.currentUser);
            }
        });

        // Pay Rent
        document.getElementById("payRentBtn").addEventListener("click", async () => {
            const amountText = document.getElementById("rentAmount").innerText;
            const amount = amountText.replace("₹", "").trim();
            const user = auth.currentUser;

            // Check if already paid for this month
            const rentQuery = query(
                collection(db, "rents"),
                where("tenantId", "==", user.uid),
                where("month", "==", currentMonth)
            );
            const existingRent = await getDocs(rentQuery);
            
            if (!existingRent.empty && existingRent.docs[0].data().status === "paid") {
                alert("You have already paid rent for this month!");
                return;
            }

            // Get tenant data for name and room
            const tenantSnap = await getDoc(doc(db, "tenants", user.uid));
            const tenantData = tenantSnap.data();

            const upiID = "adityanesur@ybl"; // Your UPI ID
            const upiLink = `upi://pay?pa=${upiID}&pn=RentFlow&am=${amount}&cu=INR`;

            // Save or update payment request
            if (existingRent.empty) {
                await addDoc(collection(db, "rents"), {
                    tenantId: user.uid,
                    tenantName: tenantData.name,
                    room: tenantData.room,
                    amount: Number(amount),
                    month: currentMonth,
                    status: "pending",
                    date: new Date()
                });
            }

            // Show QR
            const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}`;
            const qrWindow = window.open("", "_blank");
            
            qrWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Pay Rent - QR Code</title>
                    <style>
                        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0f1f, #030614); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
                        .qr-container { background: rgba(18, 25, 45, 0.9); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(0, 183, 255, 0.2); text-align: center; max-width: 400px; }
                        h2 { background: linear-gradient(135deg, #ffffff, #7bc9ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
                        img { border-radius: 20px; padding: 10px; background: white; margin: 20px 0; }
                        .amount { font-size: 24px; color: #00b7ff; margin: 10px 0; }
                        .month { color: #7bc9ff; margin-bottom: 10px; font-size: 1.2rem; }
                        .note { color: #888; font-size: 14px; margin-top: 20px; }
                    </style>
                </head>
                <body>
                    <div class="qr-container">
                        <h2>✨ Scan to Pay Rent</h2>
                        <div class="month">${currentMonth}</div>
                        <img src="${qrLink}" alt="Payment QR Code">
                        <div class="amount">Amount: ₹${amount}</div>
                        <p>Scan with any UPI app</p>
                        <div class="note">After payment, admin will confirm within 24 hours</div>
                    </div>
                </body>
                </html>
            `);
        });

        // Download Receipt
        document.addEventListener("click", function(e) {
            if (e.target.closest(".receipt-download-btn")) {
                const btn = e.target.closest(".receipt-download-btn");
                const tenantName = btn.dataset.name;
                const room = btn.dataset.room;
                const amount = btn.dataset.amount;
                const month = btn.dataset.month;
                const paymentDate = btn.dataset.date;

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();

                // Dark theme background
                pdf.setFillColor(10, 20, 40);
                pdf.rect(0, 0, 210, 297, 'F');

                // Header
                pdf.setTextColor(0, 183, 255);
                pdf.setFontSize(28);
                pdf.setFont("helvetica", "bold");
                pdf.text("RENT RECEIPT", 105, 35, { align: "center" });

                // Receipt details
                pdf.setTextColor(255, 255, 255);
                pdf.setFontSize(12);
                pdf.setFont("helvetica", "normal");
                
                pdf.text(`Tenant Name: ${tenantName}`, 20, 70);
                pdf.text(`Room Number: ${room}`, 20, 85);
                pdf.text(`Month: ${month}`, 20, 100);
                pdf.text(`Amount Paid: ₹${amount}`, 20, 115);
                pdf.text(`Payment Date: ${paymentDate}`, 20, 130);
                pdf.text(`Status: Paid`, 20, 145);
                pdf.text(`Transaction ID: ${Math.random().toString(36).substring(2, 15).toUpperCase()}`, 20, 160);

                // Footer
                pdf.setTextColor(123, 201, 255);
                pdf.setFontSize(10);
                pdf.text("Thank you for your payment!", 105, 220, { align: "center" });
                pdf.text("RentFlow - Smart Rent Management", 105, 235, { align: "center" });

                // Save
                pdf.save(`rent_receipt_${month.replace(/\s/g, '_')}.pdf`);
            }
        });
    </script>
</body>
</html>
