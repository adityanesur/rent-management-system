<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RentFlow | Tenant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --c0: #010810;
    --c1: #030e22;
    --cyan: #00d4ff;
    --cyan2: #38e8ff;
    --blue: #1a7fff;
    --glow: rgba(0, 212, 255, 0.32);
    --glowS: rgba(0, 212, 255, 0.12);
    --glass: rgba(5, 16, 38, 0.75);
    --border: rgba(0, 212, 255, 0.2);
    --borderH: rgba(0, 212, 255, 0.55);
    --tHi: #edf6ff;
    --tMid: #7fb8d8;
    --tLo: rgba(120, 170, 200, 0.45);
    --ok: #00ffb3;
    --pending: #ffd700;
    --err: #ff4d7a;
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--c0);
    color: var(--tHi);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
}

/* ===== AURORA BACKGROUND ===== */
.aurora {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    overflow: hidden;
}
.aurora-band {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    mix-blend-mode: screen;
    animation: auroraDrift 14s ease-in-out infinite alternate;
}
.a1 {
    width: 70vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(0,180,255,0.13) 0%, transparent 65%);
    top: -10vh; left: -10vw;
    animation-duration: 16s;
}
.a2 {
    width: 55vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(30,120,255,0.10) 0%, transparent 65%);
    bottom: -15vh; right: -8vw;
    animation-duration: 20s; animation-delay: -5s;
}
.a3 {
    width: 40vw; height: 40vh;
    background: radial-gradient(ellipse, rgba(0,220,255,0.08) 0%, transparent 65%);
    top: 40vh; left: 55vw;
    animation-duration: 12s; animation-delay: -9s;
}
@keyframes auroraDrift {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); }
    33%  { transform: translate(3vw,2vh) scale(1.08) rotate(3deg); }
    66%  { transform: translate(-2vw,4vh) scale(0.96) rotate(-2deg); }
    100% { transform: translate(4vw,-2vh) scale(1.04) rotate(4deg); }
}

/* ===== GRID ===== */
.grid {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background-image: 
        linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    -webkit-mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 30%, transparent 100%);
    mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 30%, transparent 100%);
}

/* ===== SPINNING RINGS ===== */
.ring-wrap {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 520px; height: 520px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
}
.ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid transparent;
}
.ring-1 {
    border-color: rgba(0,212,255,0.06);
    animation: spin1 28s linear infinite;
}
.ring-2 {
    inset: 30px;
    border-color: rgba(0,212,255,0.05);
    animation: spin1 40s linear infinite reverse;
}
.ring-3 {
    inset: 70px;
    border-color: rgba(0,212,255,0.04);
    animation: spin1 22s linear infinite;
}
.ring-1::before, .ring-2::before, .ring-3::before {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--cyan);
    top: 50%; left: -2.5px;
    box-shadow: 0 0 8px var(--cyan);
}
@keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ===== DASHBOARD CONTAINER ===== */
.dashboard-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
    position: relative;
    z-index: 2;
}

/* ===== HEADER ===== */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
}
.header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.5rem, 6vw, 2.2rem);
    background: linear-gradient(135deg, #ffffff, var(--cyan2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.2rem;
}
.header-left p {
    color: var(--tMid);
    font-size: 0.85rem;
}
.header-right {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
}
.header-btn {
    padding: 0.6rem 1.2rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: rgba(18, 25, 45, 0.6);
    color: var(--tHi);
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    backdrop-filter: blur(10px);
}
.header-btn:hover {
    border-color: var(--cyan);
    background: rgba(0, 212, 255, 0.1);
    transform: translateY(-2px);
}
.header-btn.logout {
    background: rgba(255, 75, 75, 0.15);
    border-color: rgba(255, 75, 75, 0.4);
}
.header-btn.logout:hover {
    background: rgba(255, 75, 75, 0.3);
    border-color: #ff4b4b;
}

/* ===== MAIN CARD ===== */
.main-card {
    background: var(--glass);
    backdrop-filter: blur(32px) saturate(170%);
    -webkit-backdrop-filter: blur(32px) saturate(170%);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 1.8rem;
    margin-bottom: 1.8rem;
    box-shadow: 0 28px 60px rgba(0, 0, 0, 0.65), 0 0 80px rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
}
.main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan2), var(--cyan), transparent);
    opacity: 0.6;
    animation: shimmerSlide 4s ease-in-out infinite;
}
@keyframes shimmerSlide {
    0% { background-position: -200% 0; opacity: 0.3; }
    50% { opacity: 0.8; }
    100% { background-position: 200% 0; opacity: 0.3; }
}

/* ===== INFO GRID ===== */
.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.info-item {
    background: rgba(2, 10, 26, 0.6);
    border-radius: 20px;
    padding: 1rem;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
}
.info-item:hover {
    border-color: var(--cyan);
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
}
.info-label {
    color: var(--tMid);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
}
.info-label i {
    color: var(--cyan);
}
.info-value {
    font-size: 1.2rem;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
    word-break: break-word;
}

/* ===== STATUS CARD ===== */
.status-card {
    background: rgba(0, 212, 255, 0.05);
    border-radius: 20px;
    padding: 1.2rem;
    margin: 1rem 0;
    border: 1px solid var(--border);
}
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 1rem;
    border-radius: 100px;
    font-weight: 500;
    font-size: 0.85rem;
}
.status-badge.paid {
    background: rgba(0, 255, 179, 0.15);
    color: var(--ok);
    border: 1px solid rgba(0, 255, 179, 0.3);
}
.status-badge.pending {
    background: rgba(255, 215, 0, 0.15);
    color: var(--pending);
    border: 1px solid rgba(255, 215, 0, 0.3);
}
.pay-btn {
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 100px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
}
.pay-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
}
.pay-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: linear-gradient(135deg, #4a5568, #2d3748);
}

/* ===== HISTORY SECTION ===== */
.history-section {
    margin-top: 2rem;
}
.history-section h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--tHi);
}
.history-section h3 i {
    color: var(--cyan);
}
.table-container {
    overflow-x: auto;
    border-radius: 20px;
    background: rgba(2, 10, 26, 0.5);
    border: 1px solid var(--border);
}
table {
    width: 100%;
    border-collapse: collapse;
    min-width: 500px;
}
th {
    text-align: left;
    padding: 1rem 0.8rem;
    color: var(--tMid);
    font-weight: 500;
    border-bottom: 2px solid var(--border);
    font-size: 0.8rem;
}
td {
    padding: 0.8rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    word-break: break-word;
}
tr:hover td {
    background: rgba(0, 212, 255, 0.05);
}
.receipt-download-btn {
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
    border: 1px solid var(--cyan);
    background: rgba(0, 212, 255, 0.1);
    color: white;
    cursor: pointer;
    font-size: 0.7rem;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    white-space: nowrap;
}
.receipt-download-btn:hover {
    background: rgba(0, 212, 255, 0.3);
    transform: translateY(-2px);
}
.month-badge {
    background: rgba(0, 212, 255, 0.1);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.65rem;
    color: var(--cyan2);
    display: inline-block;
    margin-left: 0.5rem;
    white-space: nowrap;
}
.no-data {
    text-align: center;
    padding: 2rem;
    color: var(--tLo);
}
.no-data i {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    opacity: 0.5;
}

/* ===== LOADING ===== */
.loading {
    text-align: center;
    padding: 3rem;
    color: var(--cyan);
}
.loading i {
    animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== MOBILE RESPONSIVE (FIXED OVERFLOW) ===== */
@media (max-width: 768px) {
    .dashboard-container {
        padding: 1rem;
    }
    .main-card {
        padding: 1.2rem;
    }
    .info-grid {
        grid-template-columns: 1fr;
        gap: 0.8rem;
    }
    .info-value {
        font-size: 1rem;
    }
    .header-btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
    }
    th, td {
        padding: 0.6rem;
        font-size: 0.75rem;
    }
}

@media (max-width: 640px) {
    .table-container {
        overflow-x: hidden;
        background: transparent;
        border: none;
        width: 100%;
    }

    table, thead, tbody, tr, td {
        display: block;
    }

    thead {
        display: none;
    }

    tbody {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    tr {
        width: 100%;
        background: rgba(2, 10, 26, 0.6);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 0.8rem;
        margin: 0;
    }

    td {
        display: grid;
        grid-template-columns: 80px 1fr;
        gap: 0.75rem;
        align-items: start;
        padding: 0.6rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
        word-break: break-word;
    }

    td:last-child {
        border-bottom: none;
    }

    td::before {
        content: attr(data-label);
        color: var(--cyan);
        font-weight: 600;
        grid-column: 1 / 2;
    }

    /* The real content (text, badge, button) naturally goes into the second column */
    td > *:not(style) {
        grid-column: 2 / 3;
        justify-self: start;
        text-align: left;
        width: 100%;
        word-break: break-word;
    }

    /* Specific adjustments for status badge and receipt button */
    .status-badge {
        white-space: normal;
        text-align: center;
        display: inline-flex;
        justify-content: center;
        width: auto;
        max-width: 100%;
    }

    .month-badge {
        margin-left: 0.5rem;
        white-space: nowrap;
        font-size: 0.6rem;
    }

    .receipt-download-btn {
        white-space: normal;
        word-break: keep-all;
        padding: 0.4rem 0.6rem;
        font-size: 0.7rem;
        width: auto;
        max-width: 100%;
        justify-content: center;
    }
}

/* Extra small devices */
@media (max-width: 480px) {
    .status-card {
        flex-direction: column;
        text-align: center;
    }
    .pay-btn {
        width: 100%;
        justify-content: center;
    }
    .status-card > div {
        flex-direction: column;
        align-items: center;
    }
    td::before {
        min-width: 60px;
    }
    .month-badge {
        white-space: normal;
        margin-left: 0;
        margin-top: 0.2rem;
    }
}
</style>
</head>
<body>
    <!-- Atmosphere (same as login) -->
<div class="aurora">
    <div class="a1 aurora-band"></div>
    <div class="a2 aurora-band"></div>
    <div class="a3 aurora-band"></div>
</div>
<div class="grid"></div>

<!-- Spinning rings (behind content) -->
<div class="ring-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
</div>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="header-left">
                <h1><i class="fas fa-home"></i> Tenant Dashboard</h1>
                <p>Manage your rent and payments</p>
            </div>
            <div class="header-right">
                <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="header-btn logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="main-card">
            <div id="loadingMessage" class="loading">
                <i class="fas fa-spinner"></i> Loading your dashboard...
            </div>
            
            <div id="content" style="display: none;">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-user"></i> TENANT NAME</div>
                        <div class="info-value" id="tenantName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-door-open"></i> ROOM NUMBER</div>
                        <div class="info-value" id="roomNumber">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-rupee-sign"></i> MONTHLY RENT</div>
                        <div class="info-value" id="rentAmount">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-calendar"></i> CURRENT MONTH</div>
                        <div class="info-value" id="currentMonth">-</div>
                    </div>
                </div>

                <!-- Status Card -->
                <div class="status-card">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
        <div>
            <div style="color: var(--tMid); font-size: 0.75rem; margin-bottom: 0.3rem;">CURRENT MONTH STATUS</div>
            <div id="paymentStatusDisplay" style="font-size: 1.5rem; font-weight: 600;"></div>
        </div>
        <button class="pay-btn" id="payRentBtn">
            <i class="fas fa-credit-card"></i> Pay Rent Now
        </button>
    </div>
</div>

                <div class="history-section">
                    <h3><i class="fas fa-history"></i> Payment History</h3>
                    <div class="table-container">
                        <table id="paymentsHistoryTable">
                            <thead>
                                <tr><th>Month</th><th>Amount</th><th>Status</th><th>Receipt</th></tr>
                            </thead>
                            <tbody id="paymentHistory">
                                <tr><td colspan="4" class="no-data"><i class="fas fa-inbox"></i><p>No payment history available</p></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            collection, 
            query, 
            where, 
            getDocs, 
            orderBy, 
            updateDoc,
            addDoc,
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let isProcessing = false;
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check.js";

// After `const app = initializeApp(firebaseConfig);`
const appCheck = initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider('YOUR_SITE_KEY_HERE'),
    isTokenAutoRefreshEnabled: true
});
        
        const now = new Date();
        const currentMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });
        document.getElementById("currentMonth").innerText = currentMonth;

        // Helper: get all rent records (without orderBy to avoid index issues)
        async function getAllTenantRents(tenantName, tenantRoom, userId) {
            // Query by uid (user's UID)
            const q1 = query(collection(db, "rents"), where("uid", "==", userId));
            // Query by tenantName + room (for records created by admin with different ID)
            const q2 = query(collection(db, "rents"), where("tenantName", "==", tenantName), where("room", "==", tenantRoom));
            
            const [snap1, snap2] = await Promise.all([getDocs(q1), getDocs(q2)]);
            const map = new Map();
            snap1.forEach(doc => map.set(doc.id, doc));
            snap2.forEach(doc => { if (!map.has(doc.id)) map.set(doc.id, doc); });
            
            // If still empty, try by tenantName only
            if (map.size === 0 && tenantName) {
                const q3 = query(collection(db, "rents"), where("tenantName", "==", tenantName));
                const snap3 = await getDocs(q3);
                snap3.forEach(doc => map.set(doc.id, doc));
            }
            // If still empty, try by room only
            if (map.size === 0 && tenantRoom) {
                const q4 = query(collection(db, "rents"), where("room", "==", tenantRoom));
                const snap4 = await getDocs(q4);
                snap4.forEach(doc => map.set(doc.id, doc));
            }
            
            // Convert to array and sort by date (descending) in memory
            const results = Array.from(map.values());
            results.sort((a, b) => {
                const dateA = a.data().date?.toDate?.() || new Date(0);
                const dateB = b.data().date?.toDate?.() || new Date(0);
                return dateB - dateA;
            });
            return results;
        }

        async function loadTenantData(user) {
            try {
                const tenantRef = doc(db, "tenants", user.uid);
                let tenantSnap = await getDoc(tenantRef);
                let tenantData = null;

                if (!tenantSnap.exists()) {
                    console.log("No tenant document found for UID:", user.uid);
                } else {
                    tenantData = tenantSnap.data();
                }

                document.getElementById("loadingMessage").style.display = "none";
                document.getElementById("content").style.display = "block";

                if (!tenantData) {
                    document.getElementById("tenantName").innerText = "Account not linked to any tenant";
                    document.getElementById("roomNumber").innerText = "Contact admin";
                    document.getElementById("rentAmount").innerText = "₹0";
                    document.getElementById("payRentBtn").disabled = true;
                    document.getElementById("paymentStatusDisplay").innerHTML = '<span class="status-badge pending">NOT SETUP</span>';
                    return;
                }

                const tenantName = tenantData.name || "Not set";
                const tenantRoom = tenantData.room || "Not assigned";
                const monthlyRent = tenantData.rent || 0;
                
                document.getElementById("tenantName").innerText = tenantName;
                document.getElementById("roomNumber").innerText = tenantRoom;
                document.getElementById("rentAmount").innerText = "₹" + monthlyRent;

                // Ensure a rent record exists for the current month (pending)
                let rentQuery = query(
                    collection(db, "rents"),
                    where("uid", "==", user.uid),
                    where("month", "==", currentMonth)
                );
                let rentSnap = await getDocs(rentQuery);
                let currentRentRecord = null;
                
                if (!rentSnap.empty) {
                    currentRentRecord = { id: rentSnap.docs[0].id, data: rentSnap.docs[0].data() };
                } else {
                    // Fallback by name+room
                    const fallbackQuery = query(
                        collection(db, "rents"),
                        where("tenantName", "==", tenantName),
                        where("room", "==", tenantRoom),
                        where("month", "==", currentMonth)
                    );
                    const fallbackSnap = await getDocs(fallbackQuery);
                    if (!fallbackSnap.empty) {
                        currentRentRecord = { id: fallbackSnap.docs[0].id, data: fallbackSnap.docs[0].data() };
                    } else {
                        // Create a new pending record
                        const newDocRef = await addDoc(collection(db, "rents"), {
                            uid: user.uid,
                            tenantName: tenantName,
                            room: tenantRoom,
                            amount: monthlyRent,
                            month: currentMonth,
                            status: "pending",
                            date: new Date(),
                            receiptGenerated: false
                        });
                        currentRentRecord = { id: newDocRef.id, data: { status: "pending", receiptGenerated: false, amount: monthlyRent, month: currentMonth } };
                    }
                }

                const isPaid = (currentRentRecord.data.status === 'paid' && currentRentRecord.data.receiptGenerated === true);
                const payRentBtn = document.getElementById("payRentBtn");
                const statusDisplay = document.getElementById("paymentStatusDisplay");
                
                if (isPaid) {
                    payRentBtn.disabled = true;
                    payRentBtn.innerHTML = `<i class="fas fa-check-circle"></i> Paid for ${currentMonth}`;
                    statusDisplay.innerHTML = '<span class="status-badge paid"><i class="fas fa-check-circle"></i> PAID</span>';
                } else {
                    payRentBtn.disabled = false;
                    payRentBtn.innerHTML = `<i class="fas fa-credit-card"></i> Pay Rent for ${currentMonth}`;
                    statusDisplay.innerHTML = '<span class="status-badge pending"><i class="fas fa-clock"></i> PENDING</span>';
                }

                // Load payment history (all past + current month)
                await loadPaymentHistory(user.uid, tenantName, tenantRoom, currentRentRecord);

            } catch (err) {
                console.error(err);
                document.getElementById("loadingMessage").innerHTML = "❌ Error loading data. Please refresh.";
                document.getElementById("loadingMessage").style.color = "#ff6b6b";
            }
        }

        async function loadPaymentHistory(userId, tenantName, tenantRoom, currentRecord) {
    const historyTable = document.getElementById("paymentHistory");
    historyTable.innerHTML = "";
    
    // Get all rent records from Firestore
    let allRecords = await getAllTenantRents(tenantName, tenantRoom, userId);
    
    // If current record is not already in the list, add it
    const alreadyExists = allRecords.some(rec => rec.id === currentRecord.id);
    if (!alreadyExists && currentRecord) {
        const fakeDoc = {
            id: currentRecord.id,
            data: () => currentRecord.data
        };
        allRecords.unshift(fakeDoc);
    }
    
    if (allRecords.length === 0) {
        const noDataRow = document.createElement("tr");
        const noDataCell = document.createElement("td");
        noDataCell.colSpan = 4;
        noDataCell.className = "no-data";
        noDataCell.innerHTML = `<i class="fas fa-inbox"></i><p>No payment history available</p>`;
        noDataRow.appendChild(noDataCell);
        historyTable.appendChild(noDataRow);
        return;
    }
    
    for (const docSnap of allRecords) {
        const data = docSnap.data();
        const isFullyPaid = (data.status === 'paid' && data.receiptGenerated === true);
        const statusClass = isFullyPaid ? 'paid' : 'pending';
        const statusText = isFullyPaid ? 'Paid' : 'Pending';
        
        let paymentDate = 'N/A';
        if (data.date) {
            if (data.date.toDate) paymentDate = data.date.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            else if (data.date.seconds) paymentDate = new Date(data.date.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        
        // Create row
        const row = document.createElement("tr");
        
        // Month cell
        const monthCell = document.createElement("td");
        monthCell.setAttribute("data-label", "Month");
        monthCell.textContent = data.month || 'N/A';
        if (isFullyPaid) {
            const badgeSpan = document.createElement("span");
            badgeSpan.className = "month-badge";
            badgeSpan.textContent = paymentDate;
            monthCell.appendChild(badgeSpan);
        }
        row.appendChild(monthCell);
        
        // Amount cell
        const amountCell = document.createElement("td");
        amountCell.setAttribute("data-label", "Amount");
        amountCell.textContent = `₹${data.amount || '0'}`;
        row.appendChild(amountCell);
        
        // Status cell
        const statusCell = document.createElement("td");
        statusCell.setAttribute("data-label", "Status");
        const statusSpan = document.createElement("span");
        statusSpan.className = `status-badge ${statusClass}`;
        statusSpan.style.padding = "0.3rem 1rem";
        statusSpan.textContent = statusText;
        statusCell.appendChild(statusSpan);
        row.appendChild(statusCell);
        
        // Receipt cell
        const receiptCell = document.createElement("td");
        receiptCell.setAttribute("data-label", "Receipt");
        if (isFullyPaid) {
            const receiptBtn = document.createElement("button");
            receiptBtn.className = "receipt-download-btn";
            receiptBtn.setAttribute("data-name", document.getElementById("tenantName").innerText);
            receiptBtn.setAttribute("data-room", document.getElementById("roomNumber").innerText);
            receiptBtn.setAttribute("data-amount", data.amount);
            receiptBtn.setAttribute("data-month", data.month);
            receiptBtn.setAttribute("data-date", paymentDate);
            receiptBtn.innerHTML = `<i class="fas fa-download"></i> Download Receipt`;
            receiptCell.appendChild(receiptBtn);
        } else {
            receiptCell.textContent = "—";
            receiptCell.style.color = "#4a5568";
        }
        row.appendChild(receiptCell);
        
        historyTable.appendChild(row);
    }
    
    // Attach receipt download listeners
    document.querySelectorAll('.receipt-download-btn').forEach(btn => {
        btn.removeEventListener('click', downloadReceipt);
        btn.addEventListener('click', downloadReceipt);
    });
}

        function downloadReceipt(e) {

    const btn = e.currentTarget;

    const tenantName = btn.dataset.name;
    const room = btn.dataset.room;
    const amount = btn.dataset.amount;
    const month = btn.dataset.month;

    pdf.setLineWidth(1.2);
    pdf.roundedRect(10, 10, 190, 277, 8, 8);

    pdf.setTextColor(255, 255, 255);
    pdf.setFont("helvetica", "bold");

    pdf.setTextColor(123, 201, 255);
    pdf.setFontSize(14);
    pdf.text("RentFlow - Smart Rent Management", 105, 52, {
        align: "center"
    });

    // ===== Receipt Box =====
    pdf.setFillColor(18, 25, 45);
    pdf.roundedRect(20, 65, 170, 120, 6, 6, "F");

    pdf.setDrawColor(0, 183, 255);
    pdf.setLineWidth(0.5);
    pdf.roundedRect(20, 65, 170, 120, 6, 6);

    // ===== Labels =====
    const leftX = 30;
    const rightX = 95;

    const startY = 85;
    const gap = 18;

    pdf.setFontSize(12);

    function addRow(label, value, y) {

        pdf.setTextColor(123, 201, 255);
        pdf.setFont("helvetica", "bold");
        pdf.text(label, leftX, y);

        pdf.setTextColor(255, 255, 255);
        pdf.setFont("helvetica", "normal");
        pdf.text(value, rightX, y);
    }

    addRow("Tenant Name", tenantName, startY);
    addRow("Room Number", room, startY + gap);
    addRow("Month", month, startY + gap * 2);
    addRow("Payment Date", paymentDate, startY + gap * 3);
    addRow("Transaction ID", transactionId, startY + gap * 4);

    // ===== Amount Section =====
    pdf.setFillColor(0, 183, 255);
    pdf.roundedRect(45, 200, 120, 30, 8, 8, "F");

    pdf.setTextColor(255, 255, 255);
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(13);
    pdf.text("TOTAL AMOUNT PAID", 105, 212, {
        align: "center"
    });

    pdf.setFontSize(22);
    pdf.text(`Rs. ${amount}`, 105, 224, { align: "center" });

    // ===== Paid Badge =====
    pdf.setFillColor(92, 255, 157);
    pdf.roundedRect(75, 242, 60, 12, 6, 6, "F");

    pdf.setTextColor(10, 20, 40);
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(11);
    pdf.text("PAYMENT SUCCESSFUL", 105, 250, {
        align: "center"
    });

    // ===== Footer =====
    pdf.setTextColor(150, 180, 220);
    pdf.setFontSize(10);
    pdf.setFont("helvetica", "normal");

    pdf.text(
        "Thank you for your payment and being a valued tenant.",
        105,
        268,
        { align: "center" }
    );

    pdf.text(
        "This is a computer-generated receipt by RentFlow.",
        105,
        276,
        { align: "center" }
    );

    // ===== Save =====
    pdf.save(`rent_receipt_${month.replace(/\s/g, "_")}.pdf`);
}

        inspectMessage.style.left = x + "px";
        inspectMessage.style.top = y + "px";

        requestAnimationFrame(() => {
            inspectMessage.style.opacity = "1";
            inspectMessage.style.transform = "translateY(0px)";
        });
    });

    // Hide message when clicking elsewhere
    document.addEventListener("click", () => {
        inspectMessage.style.opacity = "0";
        inspectMessage.style.transform = "translateY(10px)";

        setTimeout(() => {
            inspectMessage.style.display = "none";
        }, 250);
    });

    // Disable inspect shortcuts
    document.addEventListener("keydown", (e) => {

        // F12
        if (e.key === "F12") {
            e.preventDefault();
        }

        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
            e.preventDefault();
        }

        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
            e.preventDefault();
        }

        // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
            e.preventDefault();
        }

        // Ctrl+U
        if (e.ctrlKey && e.key.toLowerCase() === "u") {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
