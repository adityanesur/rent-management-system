<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RentFlow | Tenant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === UPDATED STYLES – NO EXISTING CODE REMOVED === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.15) 0%, transparent 40%),
                        linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            background-blend-mode: overlay;
            color: #ffffff;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
        }
        .header-left p { color: #b0d0ff; font-size: 0.9rem; }
        .header-right { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .header-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-btn:hover { border-color: #00b7ff; background: rgba(0, 183, 255, 0.1); transform: translateY(-2px); }
        .header-btn.logout { background: rgba(255, 75, 75, 0.2); border-color: rgba(255, 75, 75, 0.4); }
        .header-btn.logout:hover { background: rgba(255, 75, 75, 0.3); border-color: #ff4b4b; }
        .main-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 30px;
            padding: 1.8rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 183, 255, 0.1);
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        .loading { text-align: center; padding: 3rem; color: #7bc9ff; font-size: 1.1rem; }
        .loading i { margin-right: 0.5rem; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .info-item {
            background: rgba(10, 20, 40, 0.5);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(0, 183, 255, 0.15);
            transition: all 0.3s ease;
        }
        .info-item:hover { border-color: #00b7ff; box-shadow: 0 10px 30px rgba(0, 183, 255, 0.1); }
        .info-label { color: #b0d0ff; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.4rem; }
        .info-label i { color: #00b7ff; font-size: 0.9rem; }
        .info-value { font-size: 1.2rem; font-weight: 600; font-family: 'Poppins', sans-serif; word-break: break-word; overflow-wrap: break-word; }
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; border-radius: 50px; font-weight: 500; font-size: 0.85rem; word-break: break-word; overflow-wrap: break-word; }
        .status-badge.paid { background: rgba(92, 255, 157, 0.15); color: #5cff9d; border: 1px solid rgba(92, 255, 157, 0.3); }
        .status-badge.pending { background: rgba(255, 215, 0, 0.15); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3); }
        .action-buttons { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .action-btn {
            flex: 1;
            min-width: 180px;
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .pay-btn { background: linear-gradient(135deg, #00b7ff, #3e9cff); color: white; box-shadow: 0 4px 20px rgba(0, 183, 255, 0.3); }
        .pay-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0, 183, 255, 0.5); }
        .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; background: linear-gradient(135deg, #4a5568, #2d3748); }
        .history-section { margin-top: 2rem; }
        .history-section h3 { font-family: 'Poppins', sans-serif; font-size: 1.3rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .history-section h3 i { color: #00b7ff; }
        
        /* Desktop table styling – scrollable if needed */
        .table-container {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(10, 20, 40, 0.5);
            border: 1px solid rgba(0, 183, 255, 0.15);
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        th {
            text-align: left;
            padding: 1rem 0.8rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
            font-size: 0.85rem;
        }
        td {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
            font-size: 0.85rem;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        tr:hover td { background: rgba(0, 183, 255, 0.05); }
        .receipt-download-btn {
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }
        .receipt-download-btn:hover { background: rgba(0, 183, 255, 0.3); transform: translateY(-2px); }
        .month-badge {
            background: rgba(0, 183, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #7bc9ff;
            display: inline-block;
            white-space: nowrap;
        }
        .no-data {
            text-align: center;
            padding: 2rem;
            color: #b0d0ff;
        }
        .no-data i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }
        
        /* Mobile optimisations */
        @media (max-width: 768px) {
            .main-card {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            body { padding: 1rem; }
            .main-card { padding: 1.2rem; }
            .info-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .info-value { font-size: 1rem; }
            .action-btn { min-width: 100%; }
            .header-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
        
        /* Tablet and mobile: transform table to card layout – no horizontal scroll, all columns visible */
        @media (max-width: 500px) {
            .table-container {
                overflow-x: visible;
                background: transparent;
                border: none;
                padding: 0;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead {
                display: none;
            }
            tr {
                background: rgba(10, 20, 40, 0.5);
                border: 1px solid rgba(0, 183, 255, 0.2);
                border-radius: 20px;
                margin-bottom: 1rem;
                padding: 1rem;
                width: 100%;
                box-sizing: border-box;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.6rem 0;
                border-bottom: 1px solid rgba(0, 183, 255, 0.1);
                font-size: 0.9rem;
                word-break: break-word;
                overflow-wrap: break-word;
                width: 100%;
            }
            td:last-child {
                border-bottom: none;
            }
            td:before {
                content: attr(data-label);
                font-weight: 600;
                color: #7bc9ff;
                width: 40%;
                flex-shrink: 0;
            }
            .receipt-download-btn {
                white-space: normal;
                text-align: center;
                width: auto;
            }
            .month-badge {
                white-space: normal;
                display: inline-block;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="header-left">
                <h1><i class="fas fa-home"></i> Tenant Dashboard</h1>
                <p>Manage your rent and payments</p>
            </div>
            <div class="header-right">
                <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="header-btn logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="main-card">
            <div id="loadingMessage" class="loading">
                <i class="fas fa-spinner"></i> Loading your dashboard...
            </div>
            
            <div id="content" style="display: none;">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-user"></i> TENANT NAME</div>
                        <div class="info-value" id="tenantName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-door-open"></i> ROOM NUMBER</div>
                        <div class="info-value" id="roomNumber">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-rupee-sign"></i> MONTHLY RENT</div>
                        <div class="info-value" id="rentAmount">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-calendar"></i> CURRENT MONTH</div>
                        <div class="info-value" id="currentMonth">-</div>
                    </div>
                </div>

                <!-- Status Card -->
                <div style="background: rgba(0, 183, 255, 0.05); border-radius: 20px; padding: 1.2rem; margin: 1rem 0; border: 1px solid rgba(0, 183, 255, 0.2);">
                    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
                        <div>
                            <div style="color: #b0d0ff; font-size: 0.8rem; margin-bottom: 0.3rem;">CURRENT MONTH STATUS</div>
                            <div id="paymentStatusDisplay" style="font-size: 1.5rem; font-weight: 600;"></div>
                        </div>
                        <button class="action-btn pay-btn" id="payRentBtn">
                            <i class="fas fa-credit-card"></i> Pay Rent Now
                        </button>
                    </div>
                </div>

                <div class="history-section">
                    <h3><i class="fas fa-history"></i> Payment History</h3>
                    <div class="table-container">
                        <table id="paymentsHistoryTable">
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Receipt</th>
                                </tr>
                            </thead>
                            <tbody id="paymentHistory">
                                <tr>
                                    <td colspan="4" class="no-data">
                                        <i class="fas fa-inbox"></i>
                                        <p>No payment history available</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            collection, 
            query, 
            where, 
            getDocs, 
            orderBy, 
            updateDoc,
            addDoc,
            setDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const now = new Date();
        const currentMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });
        document.getElementById("currentMonth").innerText = currentMonth;

        // Store current month's rent record globally so it can be used in payment history
        let currentRentRecord = null;

        // Helper: get all rent records
        async function getAllTenantRents(tenantName, tenantRoom, userId) {
            const q1 = query(collection(db, "rents"), where("tenantId", "==", userId));
            const q2 = query(collection(db, "rents"), where("tenantName", "==", tenantName), where("room", "==", tenantRoom));
            const [snap1, snap2] = await Promise.all([getDocs(q1), getDocs(q2)]);
            const map = new Map();
            snap1.forEach(docSnap => { map.set(docSnap.id, docSnap); });
            snap2.forEach(docSnap => { if (!map.has(docSnap.id)) map.set(docSnap.id, docSnap); });
            if (map.size === 0 && tenantName) {
                const q3 = query(collection(db, "rents"), where("tenantName", "==", tenantName));
                const snap3 = await getDocs(q3);
                snap3.forEach(docSnap => { map.set(docSnap.id, docSnap); });
            }
            if (map.size === 0 && tenantRoom) {
                const q4 = query(collection(db, "rents"), where("room", "==", tenantRoom));
                const snap4 = await getDocs(q4);
                snap4.forEach(docSnap => { map.set(docSnap.id, docSnap); });
            }
            const results = Array.from(map.values());
            results.sort((a, b) => {
                const dateA = a.data().date?.toDate?.() || new Date(0);
                const dateB = b.data().date?.toDate?.() || new Date(0);
                return dateB - dateA;
            });
            console.log(`Found ${results.length} payment records`);
            return results;
        }

        async function loadTenantData(user) {
            try {
                const tenantRef = doc(db, "tenants", user.uid);
                let tenantSnap = await getDoc(tenantRef);
                let tenantData = null;

                if (!tenantSnap.exists()) {
                    console.log("No tenant document found for UID:", user.uid);
                } else {
                    tenantData = tenantSnap.data();
                }

                document.getElementById("loadingMessage").style.display = "none";
                document.getElementById("content").style.display = "block";

                if (!tenantData) {
                    document.getElementById("tenantName").innerText = "Account not linked to any tenant";
                    document.getElementById("roomNumber").innerText = "Contact admin";
                    document.getElementById("rentAmount").innerText = "₹0";
                    document.getElementById("payRentBtn").disabled = true;
                    document.getElementById("paymentStatusDisplay").innerHTML = '<span class="status-badge pending">NOT SETUP</span>';
                    return;
                }

                const tenantName = tenantData.name || "Not set";
                const tenantRoom = tenantData.room || "Not assigned";
                const monthlyRent = tenantData.rent || 0;
                
                document.getElementById("tenantName").innerText = tenantName;
                document.getElementById("roomNumber").innerText = tenantRoom;
                document.getElementById("rentAmount").innerText = "₹" + monthlyRent;

                // Get current month's rent record
                let rentQuery = query(
                    collection(db, "rents"),
                    where("tenantId", "==", user.uid),
                    where("month", "==", currentMonth)
                );
                let rentSnap = await getDocs(rentQuery);
                let rentRecord = null;
                if (!rentSnap.empty) {
                    rentRecord = { id: rentSnap.docs[0].id, data: rentSnap.docs[0].data() };
                } else {
                    const fallbackQuery = query(
                        collection(db, "rents"),
                        where("tenantName", "==", tenantName),
                        where("room", "==", tenantRoom),
                        where("month", "==", currentMonth)
                    );
                    const fallbackSnap = await getDocs(fallbackQuery);
                    if (!fallbackSnap.empty) {
                        rentRecord = { id: fallbackSnap.docs[0].id, data: fallbackSnap.docs[0].data() };
                    } else {
                        // Create new pending record
                        const newDocRef = await addDoc(collection(db, "rents"), {
                            tenantId: user.uid,
                            tenantName: tenantName,
                            room: tenantRoom,
                            amount: monthlyRent,
                            month: currentMonth,
                            status: "pending",
                            date: new Date(),
                            receiptGenerated: false
                        });
                        rentRecord = { id: newDocRef.id, data: { status: "pending", receiptGenerated: false, amount: monthlyRent, month: currentMonth } };
                    }
                }

                // Store globally for payment history
                currentRentRecord = rentRecord;

                const isPaid = (rentRecord.data.status === 'paid' && rentRecord.data.receiptGenerated === true);
                const payRentBtn = document.getElementById("payRentBtn");
                const statusDisplay = document.getElementById("paymentStatusDisplay");
                
                if (isPaid) {
                    payRentBtn.disabled = true;
                    payRentBtn.innerHTML = `<i class="fas fa-check-circle"></i> Paid for ${currentMonth}`;
                    statusDisplay.innerHTML = '<span class="status-badge paid"><i class="fas fa-check-circle"></i> PAID</span>';
                } else {
                    payRentBtn.disabled = false;
                    payRentBtn.innerHTML = `<i class="fas fa-credit-card"></i> Pay Rent for ${currentMonth}`;
                    statusDisplay.innerHTML = '<span class="status-badge pending"><i class="fas fa-clock"></i> PENDING</span>';
                }

                // Load payment history (including current month if pending)
                await loadPaymentHistory(user.uid, tenantName, tenantRoom, rentRecord);

            } catch (err) {
                console.error(err);
                document.getElementById("loadingMessage").innerHTML = "❌ Error loading data. Please refresh.";
                document.getElementById("loadingMessage").style.color = "#ff6b6b";
            }
        }

        async function loadPaymentHistory(userId, tenantName, tenantRoom, currentRecord) {
            const historyTable = document.getElementById("paymentHistory");
            historyTable.innerHTML = "";
            let rentDocs = await getAllTenantRents(tenantName, tenantRoom, userId);

            // Ensure current month's record is included (if it's pending and not already in the list)
            if (currentRecord && !rentDocs.some(doc => doc.id === currentRecord.id)) {
                // Create a fake docSnap object
                const fakeSnap = {
                    id: currentRecord.id,
                    data: () => currentRecord.data
                };
                rentDocs.unshift(fakeSnap);
            }

            if (rentDocs.length === 0) {
                historyTable.innerHTML = '<tr><td colspan="4" class="no-data"><i class="fas fa-inbox"></i><p>No payment history available</p><\/td><\/tr>';
                return;
            }

            for (const docSnap of rentDocs) {
                const data = docSnap.data();
                const isFullyPaid = (data.status === 'paid' && data.receiptGenerated === true);
                const statusClass = isFullyPaid ? 'paid' : 'pending';
                const statusText = isFullyPaid ? 'Paid' : 'Pending';
                let paymentDate = 'N/A';
                if (data.date) {
                    if (data.date.toDate) paymentDate = data.date.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    else if (data.date.seconds) paymentDate = new Date(data.date.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                }
                const row = document.createElement("tr");
                // data-label attributes for mobile card layout
                row.innerHTML = `
                    <td data-label="Month">${data.month || 'N/A'} ${isFullyPaid ? `<span class="month-badge">${paymentDate}</span>` : ''}<\/td>
                    <td data-label="Amount">₹${data.amount || '0'}<\/td>
                    <td data-label="Status"><span class="status-badge ${statusClass}" style="padding: 0.3rem 1rem;">${statusText}</span><\/td>
                    <td data-label="Receipt">${isFullyPaid ? `<button class="receipt-download-btn" data-name="${document.getElementById("tenantName").innerText}" data-room="${document.getElementById("roomNumber").innerText}" data-amount="${data.amount}" data-month="${data.month}" data-date="${paymentDate}"><i class="fas fa-download"></i> Download Receipt</button>` : '<span style="color:#4a5568;">—</span>'}<\/td>
                `;
                historyTable.appendChild(row);
            }
            document.querySelectorAll('.receipt-download-btn').forEach(btn => {
                btn.removeEventListener('click', downloadReceipt);
                btn.addEventListener('click', downloadReceipt);
            });
        }

        function downloadReceipt(e) {
            const btn = e.currentTarget;
            const tenantName = btn.dataset.name;
            const room = btn.dataset.room;
            const amount = btn.dataset.amount;
            const month = btn.dataset.month;
            const paymentDate = btn.dataset.date;
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.setFillColor(10, 20, 40);
            pdf.rect(0, 0, 210, 297, 'F');
            pdf.setTextColor(0, 183, 255);
            pdf.setFontSize(28);
            pdf.setFont("helvetica", "bold");
            pdf.text("RENT RECEIPT", 105, 35, { align: "center" });
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(12);
            pdf.text(`Tenant Name: ${tenantName}`, 20, 70);
            pdf.text(`Room Number: ${room}`, 20, 85);
            pdf.text(`Month: ${month}`, 20, 100);
            pdf.text(`Amount Paid: ₹${amount}`, 20, 115);
            pdf.text(`Payment Date: ${paymentDate}`, 20, 130);
            pdf.text(`Status: Paid`, 20, 145);
            pdf.text(`Transaction ID: ${Math.random().toString(36).substring(2, 15).toUpperCase()}`, 20, 160);
            pdf.setTextColor(123, 201, 255);
            pdf.setFontSize(10);
            pdf.text("Thank you for your payment!", 105, 220, { align: "center" });
            pdf.text("RentFlow - Smart Rent Management", 105, 235, { align: "center" });
            pdf.save(`rent_receipt_${month.replace(/\s/g, '_')}.pdf`);
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "login.html";
            else await loadTenantData(user);
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });

        document.getElementById("refreshBtn").addEventListener("click", () => {
            if (auth.currentUser) loadTenantData(auth.currentUser);
        });

        // Enhanced QR popup with tenant details + admin UPI info
        document.getElementById("payRentBtn").addEventListener("click", async () => {
            try {
                const amountText = document.getElementById("rentAmount").innerText;
                const amount = amountText.replace("₹", "").trim();
                const user = auth.currentUser;
                if (!user) { alert("Please login again."); return; }

                const tenantSnap = await getDoc(doc(db, "tenants", user.uid));
                if (!tenantSnap.exists()) {
                    alert("Tenant record not found. Please contact admin.");
                    return;
                }
                const tenantData = tenantSnap.data();
                const tenantName = tenantData.name;
                const tenantRoom = tenantData.room;

                const rentQuery = query(
                    collection(db, "rents"),
                    where("tenantId", "==", user.uid),
                    where("month", "==", currentMonth)
                );
                const existingRent = await getDocs(rentQuery);

                if (!existingRent.empty) {
                    const existingDoc = existingRent.docs[0];
                    if (existingDoc.data().status === "paid" && existingDoc.data().receiptGenerated === true) {
                        alert("You have already paid rent for this month!");
                        return;
                    }
                    await updateDoc(doc(db, "rents", existingDoc.id), {
                        status: "pending",
                        date: new Date(),
                        receiptGenerated: false
                    });
                } else {
                    await addDoc(collection(db, "rents"), {
                        tenantId: user.uid,
                        tenantName: tenantName,
                        room: tenantRoom,
                        amount: Number(amount),
                        month: currentMonth,
                        status: "pending",
                        date: new Date(),
                        receiptGenerated: false
                    });
                }

                const upiID = "adityanesur@ybl";
                const bankName = "ADITYA NESUR";
                const upiLink = `upi://pay?pa=${upiID}&pn=${encodeURIComponent(bankName)}&am=${amount}&cu=INR&m=0`;
                const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}`;
                
                const qrWindow = window.open("", "_blank");
                qrWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
                        <title>Pay Rent - QR Code</title>
                        <style>
                            * { margin: 0; padding: 0; box-sizing: border-box; }
                            body {
                                font-family: 'Inter', sans-serif;
                                background: linear-gradient(135deg, #0a0f1f, #030614);
                                color: white;
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                min-height: 100vh;
                                padding: 20px;
                            }
                            .qr-container {
                                background: rgba(18, 25, 45, 0.95);
                                backdrop-filter: blur(20px);
                                padding: 30px 20px;
                                border-radius: 35px;
                                border: 1px solid rgba(0, 183, 255, 0.3);
                                text-align: center;
                                max-width: 420px;
                                width: 100%;
                                box-shadow: 0 20px 40px rgba(0,0,0,0.5);
                            }
                            h2 {
                                background: linear-gradient(135deg, #ffffff, #7bc9ff);
                                -webkit-background-clip: text;
                                -webkit-text-fill-color: transparent;
                                margin-bottom: 20px;
                                font-size: 1.8rem;
                            }
                            .details-card {
                                background: rgba(0, 0, 0, 0.3);
                                border-radius: 20px;
                                padding: 15px;
                                margin: 20px 0;
                                text-align: left;
                            }
                            .detail-row {
                                display: flex;
                                justify-content: space-between;
                                padding: 8px 0;
                                border-bottom: 1px solid rgba(0, 183, 255, 0.2);
                                font-size: 1rem;
                                flex-wrap: wrap;
                                gap: 0.5rem;
                            }
                            .detail-label { color: #7bc9ff; font-weight: 500; }
                            .detail-value { color: white; font-weight: 600; word-break: break-word; }
                            .upi-box {
                                background: rgba(0, 183, 255, 0.1);
                                border-radius: 15px;
                                padding: 10px;
                                margin: 15px 0;
                                text-align: center;
                            }
                            .upi-box p { margin: 5px 0; word-break: break-word; }
                            .upi-id { font-size: 1.1rem; color: #00b7ff; font-weight: bold; letter-spacing: 1px; word-break: break-all; }
                            img {
                                border-radius: 20px;
                                padding: 10px;
                                background: white;
                                margin: 15px 0;
                                width: 200px;
                                height: 200px;
                                max-width: 100%;
                            }
                            .amount { font-size: 28px; color: #00b7ff; font-weight: bold; margin: 10px 0; }
                            .note { color: #888; font-size: 12px; margin-top: 20px; }
                            @media (max-width: 480px) {
                                .qr-container { padding: 20px 15px; }
                                .detail-row { font-size: 0.9rem; }
                                img { width: 160px; height: 160px; }
                            }
                        </style>
                    </head>
                    <body>
                        <div class="qr-container">
                            <h2>✨ Scan to Pay Rent</h2>
                            <div class="details-card">
                                <div class="detail-row">
                                    <span class="detail-label">Tenant Name</span>
                                    <span class="detail-value">${tenantName}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Room Number</span>
                                    <span class="detail-value">${tenantRoom}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Month</span>
                                    <span class="detail-value">${currentMonth}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Amount</span>
                                    <span class="detail-value">₹${amount}</span>
                                </div>
                            </div>
                            <div class="upi-box">
                                <p>📱 Pay to UPI ID</p>
                                <p class="upi-id">${upiID}</p>
                                <p>🏦 ${bankName}</p>
                            </div>
                            <img src="${qrLink}" alt="Payment QR Code">
                            <div class="amount">₹${amount}</div>
                            <p>Scan with any UPI app<br>(Google Pay, PhonePe, Paytm)</p>
                            <div class="note">✅ After payment, admin will verify and generate receipt.</div>
                        </div>
                    </body>
                    </html>
                `);
                setTimeout(() => loadTenantData(user), 1000);
            } catch (error) {
                console.error(error);
                alert("Error processing payment: " + error.message);
            }
        });
    </script>
</body>
</html>
