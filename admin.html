<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(160deg,#0b0f1c,#03050b);
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(18,25,45,0.6);
backdrop-filter:blur(12px);
padding:30px;
border-radius:2rem;
border:1px solid rgba(110,180,255,0.2);
box-shadow:0 0 30px rgba(0,183,255,0.2);
margin-bottom:30px;
}

h2{
font-family:Poppins;
background:linear-gradient(90deg,#ffffff,#7bc9ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#101a33;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#00b7ff,#3e9cff);
color:white;
cursor:pointer;
}

.tenant{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Add Tenant</h2>

<input id="tenantUID" placeholder="Tenant UID">
<input id="tenantName" placeholder="Tenant Name">
<input id="roomId" placeholder="Room Number">
<input id="rentAmount" placeholder="Rent Amount">

<button id="addTenantBtn">Add Tenant</button>

</div>

<div class="card">

<h2>Tenant List</h2>

<div id="tenantList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import { getFirestore, doc, setDoc, getDocs, collection }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
authDomain: "rent-management-system-86ccc.firebaseapp.com",
projectId: "rent-management-system-86ccc",
storageBucket: "rent-management-system-86ccc.appspot.com",
messagingSenderId: "676999561040",
appId: "1:676999561040:web:f1166d818a33c5a008f655"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("addTenantBtn").addEventListener("click", async ()=>{

const uid = document.getElementById("tenantUID").value;
const name = document.getElementById("tenantName").value;
const room = document.getElementById("roomId").value;
const rent = document.getElementById("rentAmount").value;

await setDoc(doc(db,"tenants",uid),{

name:name,
roomId:room,
rent:rent,
status:"pending"

});

alert("Tenant Added");

loadTenants();

});

async function loadTenants(){

const querySnapshot = await getDocs(collection(db,"tenants"));

const list = document.getElementById("tenantList");

list.innerHTML="";

querySnapshot.forEach((doc)=>{

const data = doc.data();

list.innerHTML += `
<div class="tenant">
${data.name} — Room ${data.roomId} — ₹${data.rent} — ${data.status}
</div>
`;

});

}

loadTenants();

</script>

</body>
</html>
