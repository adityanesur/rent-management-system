<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentFlow | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .header-left p {
            color: #b0d0ff;
        }

        .header-right {
            display: flex;
            gap: 1rem;
        }

        .admin-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-btn:hover {
            border-color: #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            transform: translateY(-2px);
        }

        .admin-btn.logout {
            background: rgba(255, 75, 75, 0.2);
            border-color: rgba(255, 75, 75, 0.4);
        }

        .admin-btn.logout:hover {
            background: rgba(255, 75, 75, 0.3);
            border-color: #ff4b4b;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 25px;
            padding: 1.8rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00b7ff;
            box-shadow: 0 20px 40px rgba(0, 183, 255, 0.15);
        }

        .stat-icon {
            font-size: 2rem;
            color: #00b7ff;
            margin-bottom: 1rem;
        }

        .stat-label {
            color: #b0d0ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        /* Two Column Layout */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Add Tenant Form */
        .form-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 30px;
            padding: 2rem;
        }

        .form-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-card h3 i {
            color: #00b7ff;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #b0d0ff;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(10, 20, 40, 0.6);
            border: 2px solid rgba(0, 183, 255, 0.2);
            border-radius: 15px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #00b7ff;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00b7ff, #3e9cff);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 183, 255, 0.4);
        }

        /* Tenants Table */
        .table-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 30px;
            padding: 2rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-header h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-header h3 i {
            color: #00b7ff;
        }

        .generate-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 50px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .generate-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
        }

        tr:hover td {
            background: rgba(0, 183, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-paid {
            background: rgba(92, 255, 157, 0.2);
            color: #5cff9d;
            border: 1px solid rgba(92, 255, 157, 0.3);
        }

        .status-pending {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .status-overdue {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .delete-btn {
            padding: 0.4rem 1rem;
            background: rgba(255, 75, 75, 0.2);
            border: 1px solid #ff4b4b;
            border-radius: 50px;
            color: #ff4b4b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: rgba(255, 75, 75, 0.3);
        }

        /* Message */
        .message {
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .message.success {
            background: rgba(92, 255, 157, 0.1);
            border: 1px solid #5cff9d;
            color: #5cff9d;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-right {
                width: 100%;
            }
            
            .admin-btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-left">
                <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
                <p>Manage tenants and track payments</p>
            </div>
            <div class="header-right">
                <button class="admin-btn" id="viewPaymentsBtn">
                    <i class="fas fa-credit-card"></i> Payments
                </button>
                <button class="admin-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="admin-btn logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-label">Total Tenants</div>
                <div class="stat-value" id="totalTenants">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                <div class="stat-label">Total Rent</div>
                <div class="stat-value" id="totalRent">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-label">Collected</div>
                <div class="stat-value" id="paidRent">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pendingRent">₹0</div>
            </div>
        </div>

        <!-- Two Column Layout -->
        <div class="two-column">
            <!-- Add Tenant Form -->
            <div class="form-card">
                <h3><i class="fas fa-user-plus"></i> Add New Tenant</h3>
                <div class="form-group">
                    <label>Tenant Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Room Number</label>
                    <input type="text" id="room" class="form-control" placeholder="e.g., 101">
                </div>
                <div class="form-group">
                    <label>Rent Amount (₹)</label>
                    <input type="number" id="rent" class="form-control" placeholder="Enter amount">
                </div>
                <button class="submit-btn" id="addTenant">
                    <i class="fas fa-plus-circle"></i> Add Tenant
                </button>
            </div>

            <!-- Tenants Table -->
            <div class="table-card">
                <div class="table-header">
                    <h3><i class="fas fa-list"></i> Tenants List</h3>
                    <button class="generate-btn" id="generateRentBtn">
                        <i class="fas fa-file-invoice"></i> Generate Monthly Rent
                    </button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Room</th>
                                <th>Rent (₹)</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tenantTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Check admin access
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists() || userDoc.data().role !== "admin") {
                alert("Access denied. Admin only.");
                window.location.href = "dashboard.html";
            }
        });

        // Load tenants
        async function loadTenants() {
            const tenantTable = document.getElementById("tenantTable");
            tenantTable.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading tenants...</td></tr>';

            const querySnapshot = await getDocs(collection(db, "tenants"));
            tenantTable.innerHTML = "";

            let totalTenants = 0;
            let totalRent = 0;
            let paidRent = 0;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                totalTenants++;
                totalRent += Number(data.rent) || 0;
                if (data.status === "paid") paidRent += Number(data.rent) || 0;

                let statusClass = "status-pending";
                if (data.status === "paid") statusClass = "status-paid";
                else if (data.status === "overdue") statusClass = "status-overdue";

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${data.name || "N/A"}</td>
                    <td>${data.room || "N/A"}</td>
                    <td>₹${data.rent || "0"}</td>
                    <td><span class="status-badge ${statusClass}">${data.status || "pending"}</span></td>
                    <td>
                        <button class="delete-btn" onclick="window.deleteTenant('${docSnap.id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                `;
                tenantTable.appendChild(row);
            });

            // Update stats
            document.getElementById("totalTenants").innerText = totalTenants;
            document.getElementById("totalRent").innerText = `₹${totalRent}`;
            document.getElementById("paidRent").innerText = `₹${paidRent}`;
            document.getElementById("pendingRent").innerText = `₹${totalRent - paidRent}`;
        }

        // Delete tenant
        window.deleteTenant = async (tenantId) => {
            if (confirm("Are you sure you want to delete this tenant?")) {
                await deleteDoc(doc(db, "tenants", tenantId));
                showMessage("Tenant deleted successfully!", "success");
                loadTenants();
            }
        };

        // Add tenant
        document.getElementById("addTenant").addEventListener("click", async () => {
            const name = document.getElementById("name").value;
            const room = document.getElementById("room").value;
            const rent = document.getElementById("rent").value;

            if (!name || !room || !rent) {
                showMessage("Please fill all fields", "error");
                return;
            }

            await addDoc(collection(db, "tenants"), {
                name: name,
                room: room,
                rent: Number(rent),
                status: "pending"
            });

            showMessage("Tenant added successfully!", "success");
            document.getElementById("name").value = "";
            document.getElementById("room").value = "";
            document.getElementById("rent").value = "";
            loadTenants();
        });

        // Generate monthly rent
        document.getElementById("generateRentBtn").addEventListener("click", async () => {
            const tenantsSnapshot = await getDocs(collection(db, "tenants"));
            const month = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

            tenantsSnapshot.forEach(async (docSnap) => {
                const data = docSnap.data();
                await addDoc(collection(db, "rents"), {
                    tenantId: docSnap.id,
                    tenantName: data.name,
                    room: data.room,
                    amount: Number(data.rent),
                    month: month,
                    status: "pending",
                    date: new Date()
                });
            });

            showMessage("Monthly rent generated for all tenants!", "success");
        });

        // View payments
        document.getElementById("viewPaymentsBtn").addEventListener("click", () => {
            window.location.href = "admin-payments.html";
        });

        // Refresh
        document.getElementById("refreshBtn").addEventListener("click", loadTenants);

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        // Show message
        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
        }

        // Initial load
        loadTenants();
    </script>
</body>
</html>
