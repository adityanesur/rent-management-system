<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0b0f1c;
color:white;
padding:40px;
}

.card{
background:#1a2238;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px 20px;
background:#00b7ff;
border:none;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:30px;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<div class="card">
<h3>📊 System Analytics</h3>

<div style="display:flex; gap:20px; margin-bottom:20px;">

<div class="card" style="padding:15px;">
Total Tenants<br>
<b id="totalTenants">0</b>
</div>

<div class="card" style="padding:15px;">
Total Rent<br>
<b id="totalRent">₹0</b>
</div>

<div class="card" style="padding:15px;">
Paid Rent<br>
<b id="paidRent">₹0</b>
</div>

<div class="card" style="padding:15px;">
Pending Rent<br>
<b id="pendingRent">₹0</b>
</div>

</div>
<h2>Admin Dashboard</h2>
<button id="logoutBtn">Logout</button>

<h3>Add Tenant</h3>
<button id="viewPaymentsBtn">View Payments</button>

<input id="name" placeholder="Tenant Name">
<input id="room" placeholder="Room Number">
<input id="rent" placeholder="Rent Amount">

<button id="addTenant">Add Tenant</button>

<h3>Tenants List</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Room</th>
<th>Rent</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tenantTable"></tbody>

</table>

</div>

<script type="module">
document.getElementById("viewPaymentsBtn").addEventListener("click", () => {

window.location.href = "admin-payments.html";

});
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, doc, getDoc, query, where }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
authDomain: "rent-management-system-86ccc.firebaseapp.com",
projectId: "rent-management-system-86ccc",
storageBucket: "rent-management-system-86ccc.appspot.com",
messagingSenderId: "676999561040",
appId: "1:676999561040:web:f1166d818a33c5a008f655"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);
  onAuthStateChanged(auth, async (user)=>{

if(!user){
alert("Please login first");
window.location.href="login.html";
return;
}

const userDoc = await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()){
alert("User record missing");
window.location.href="login.html";
return;
}

const role = userDoc.data().role;

if(role !== "admin"){
alert("Access denied");
window.location.href="dashboard.html";
}

});
const tenantTable = document.getElementById("tenantTable");

document.getElementById("addTenant").addEventListener("click", async ()=>{

const name = document.getElementById("name").value;
const room = document.getElementById("room").value;
const rent = document.getElementById("rent").value;

await addDoc(collection(db,"tenants"),{

name:name,
roomId:room,
rent:rent,
status:"pending"

});

alert("Tenant Added");

loadTenants();

});

async function loadTenants(){

tenantTable.innerHTML="";

const querySnapshot = await getDocs(collection(db,"tenants"));

querySnapshot.forEach(doc=>{

const data = doc.data();

tenantTable.innerHTML+=`

<tr>
<td>${data.name}</td>
<td>${data.room}</td>
<td>₹${data.rent}</td>
<td>${data.status}</td>
</tr>

`;

});

}

loadTenants();

  document.getElementById("logoutBtn").addEventListener("click", () => {

signOut(auth).then(() => {

alert("Admin logged out");

window.location.href = "login.html";

}).catch((error) => {

console.log(error);

});

});
  function openPayments(){
window.location.href = "admin-payments.html";
}
  async function loadAnalytics(){

let totalTenants = 0;
let totalRent = 0;
let paidRent = 0;
let pendingRent = 0;

// TENANTS
const tenantsSnapshot = await getDocs(collection(db,"tenants"));

tenantsSnapshot.forEach((doc)=>{
const data = doc.data();

totalTenants++;

totalRent += Number(data.rent);

if(data.status === "paid"){
paidRent += Number(data.rent);
}else{
pendingRent += Number(data.rent);
}

});

document.getElementById("totalTenants").innerText = totalTenants;
document.getElementById("totalRent").innerText = "₹"+totalRent;
document.getElementById("paidRent").innerText = "₹"+paidRent;
document.getElementById("pendingRent").innerText = "₹"+pendingRent;

}
  loadAnalytics();
</script>

</body>
</html>
