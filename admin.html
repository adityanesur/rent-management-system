<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RentFlow | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === UPDATED STYLES – FULLY RESPONSIVE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { max-width: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.15) 0%, transparent 40%),
                        linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            background-blend-mode: overlay;
            color: #ffffff;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
        }
        .admin-container { max-width: 1400px; margin: 0 auto; width: 100%; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .header-left h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
        }
        .header-left p { color: #b0d0ff; font-size: 0.9rem; }
        .header-right { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .admin-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 183, 255, 0.3);
            background: rgba(18, 25, 45, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .admin-btn:hover { border-color: #00b7ff; background: rgba(0, 183, 255, 0.1); transform: translateY(-2px); }
        .admin-btn.logout { background: rgba(255, 75, 75, 0.2); border-color: rgba(255, 75, 75, 0.4); }
        .admin-btn.logout:hover { background: rgba(255, 75, 75, 0.3); border-color: #ff4b4b; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 20px;
            padding: 1.2rem;
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #00b7ff; box-shadow: 0 20px 40px rgba(0, 183, 255, 0.15); }
        .stat-icon { font-size: 1.8rem; color: #00b7ff; margin-bottom: 0.5rem; }
        .stat-label { color: #b0d0ff; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.3rem; }
        .stat-value { font-size: 1.5rem; font-weight: 600; font-family: 'Poppins', sans-serif; }
        
        /* Two Column Layout */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        /* Form Card */
        .form-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 25px;
            padding: 1.5rem;
        }
        .form-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-card h3 i { color: #00b7ff; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: #b0d0ff; font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(10, 20, 40, 0.6);
            border: 2px solid rgba(0, 183, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .form-control:focus { outline: none; border-color: #00b7ff; box-shadow: 0 0 20px rgba(0, 183, 255, 0.2); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #00b7ff, #3e9cff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 183, 255, 0.4); }
        
        /* Table Card */
        .table-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 25px;
            padding: 1.5rem;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .table-header h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .table-header h3 i { color: #00b7ff; }
        .generate-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 50px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        .generate-btn:hover { background: rgba(255, 215, 0, 0.3); transform: translateY(-2px); }
        
        /* Desktop table styling – scrollable if needed */
        .table-container {
            overflow-x: auto;
            border-radius: 15px;
            background: rgba(10, 20, 40, 0.5);
            border: 1px solid rgba(0, 183, 255, 0.15);
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }
        th {
            text-align: left;
            padding: 0.8rem;
            color: #b0d0ff;
            font-weight: 500;
            border-bottom: 2px solid rgba(0, 183, 255, 0.2);
            font-size: 0.85rem;
        }
        td {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(0, 183, 255, 0.1);
            font-size: 0.85rem;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        tr:hover td { background: rgba(0, 183, 255, 0.05); }
        .status-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem; font-weight: 500; }
        .status-paid { background: rgba(92, 255, 157, 0.2); color: #5cff9d; border: 1px solid rgba(92, 255, 157, 0.3); }
        .status-pending { background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3); }
        .status-overdue { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); }
        .delete-btn, .view-btn {
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            margin: 0 0.2rem;
        }
        .delete-btn { background: rgba(255, 75, 75, 0.2); border: 1px solid #ff4b4b; color: #ff4b4b; }
        .delete-btn:hover { background: rgba(255, 75, 75, 0.3); }
        .view-btn { background: rgba(0, 183, 255, 0.2); border: 1px solid #00b7ff; color: #00b7ff; }
        .view-btn:hover { background: rgba(0, 183, 255, 0.3); }
        
        .message {
            padding: 0.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        .message.success { background: rgba(92, 255, 157, 0.1); border: 1px solid #5cff9d; color: #5cff9d; }
        .message.error { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff6b6b; }
        .message.info { background: rgba(123, 201, 255, 0.1); border: 1px solid #7bc9ff; color: #7bc9ff; }
        
        /* Mobile breakpoints */
        @media (max-width: 1024px) {
            .two-column { grid-template-columns: 1fr; gap: 1rem; }
        }
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; align-items: flex-start; }
            .header-right { width: 100%; }
            .admin-btn { flex: 1; justify-content: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {

    body {
        padding: 1rem;
    }

    .stat-card {
        padding: 0.8rem;
    }

    .stat-value {
        font-size: 1.2rem;
    }

    .form-card,
    .table-card {
        padding: 1rem;
        width: 100%;
        overflow: hidden;
    }

    .form-row {
        grid-template-columns: 1fr;
    }

    .stats-grid {
        grid-template-columns: 1fr;
    }

    /* FIXED MOBILE TABLE LAYOUT */

    .table-container {
        overflow-x: hidden;
        background: transparent;
        border: none;
        padding: 0;
        width: 100%;
    }

    table {
        width: 100%;
        min-width: 100%;
        border-collapse: collapse;
    }

    thead {
        display: none;
    }

    tbody {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
    }

    tr {
        display: block;
        width: 100%;
        background: rgba(10, 20, 40, 0.55);
        border: 1px solid rgba(0, 183, 255, 0.2);
        border-radius: 20px;
        padding: 1rem;
        box-sizing: border-box;
    }

    td {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        width: 100%;
        padding: 0.7rem 0;
        border-bottom: 1px solid rgba(0, 183, 255, 0.1);
        font-size: 0.85rem;
        word-break: break-word;
        overflow-wrap: break-word;
    }

    td:last-child {
        border-bottom: none;
    }

    td::before {
        content: attr(data-label);
        color: #7bc9ff;
        font-weight: 600;
        min-width: 90px;
        max-width: 90px;
        flex-shrink: 0;
    }

    td span,
    td button {
        text-align: right;
    }

    .delete-btn,
    .view-btn {
        padding: 0.35rem 0.7rem;
        font-size: 0.72rem;
    }

    .status-badge {
        padding: 0.3rem 0.7rem;
        font-size: 0.75rem;
    }

    /* Prevent form overflow */

    .form-control {
        width: 100%;
        max-width: 100%;
    }

    .submit-btn,
    .generate-btn,
    .admin-btn {
        max-width: 100%;
    }

    .table-header {
        width: 100%;
    }
}
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-left">
                <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
                <p>Manage tenants and track payments</p>
            </div>
            <div class="header-right">
                <button class="admin-btn" id="viewPaymentsBtn"><i class="fas fa-credit-card"></i> Payments</button>
                <button class="admin-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="admin-btn logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        <div id="message" class="message"></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-label">Total Tenants</div><div class="stat-value" id="totalTenants">0</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-rupee-sign"></i></div><div class="stat-label">Total Rent</div><div class="stat-value" id="totalRent">₹0</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-label">Collected</div><div class="stat-value" id="paidRent">₹0</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-label">Pending</div><div class="stat-value" id="pendingRent">₹0</div></div>
        </div>
        <div class="two-column">
            <div class="form-card">
                <h3><i class="fas fa-user-plus"></i> Add New Tenant</h3>
                <div class="form-group">
                    <label>Tenant Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter full name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Room Number</label>
                        <input type="text" id="room" class="form-control" placeholder="e.g., 101">
                    </div>
                    <div class="form-group">
                        <label>Joining Date</label>
                        <input type="date" id="joiningDate" class="form-control" value="2026-01-01">
                    </div>
                </div>
                <div class="form-group">
                    <label>Rent Amount (₹)</label>
                    <input type="number" id="rent" class="form-control" placeholder="Enter amount">
                </div>
                <div class="form-group">
                    <label>Firebase User UID (from Authentication → Users)</label>
                    <input type="text" id="userUid" class="form-control" placeholder="Paste the user's UID">
                    <small style="color:#7bc9ff;">Required: Get the UID from Firebase Console → Authentication → Users</small>
                </div>
                <button class="submit-btn" id="addTenant"><i class="fas fa-plus-circle"></i> Add Tenant</button>
            </div>
            <div class="table-card">
                <div class="table-header">
                    <h3><i class="fas fa-list"></i> Tenants List</h3>
                    <button class="generate-btn" id="generateRentBtn"><i class="fas fa-file-invoice"></i> Generate Monthly Rent</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Room</th>
                                <th>Joined</th>
                                <th>Rent (₹)</th>
                                <th>Current Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tenantTable">
                            <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading tenants...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, query, where, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Helper: normalise string (trim, lower case)
        function normalise(str) {
            return String(str).trim().toLowerCase();
        }

        // Helper: format joining date
        function formatJoiningDate(dateValue) {
            if (!dateValue) return 'Not set';
            try {
                if (dateValue.toDate) return dateValue.toDate().toLocaleDateString('en-IN');
                const d = new Date(dateValue);
                if (isNaN(d.getTime())) return 'Invalid date';
                return d.toLocaleDateString('en-IN');
            } catch (e) { return 'Invalid date'; }
        }

        // Enhanced: find current month's rent record using normalised matching
        async function findCurrentMonthRentRecord(tenantDocId, data, currentMonth) {
            const tenantName = data.name;
            const tenantRoom = data.room;
            const normalisedName = normalise(tenantName);
            const normalisedRoom = normalise(tenantRoom);

            // Strategy 1: by tenantName + room (normalised)
            let q = query(
                collection(db, "rents"),
                where("month", "==", currentMonth)
            );
            let snap = await getDocs(q);
            let found = null;
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const dName = normalise(d.tenantName || "");
                const dRoom = normalise(d.room || "");
                if (dName === normalisedName && dRoom === normalisedRoom) {
                    found = { doc: docSnap, data: d };
                }
            });
            if (found) return found;

            // Strategy 2: by tenantId (document ID)
            q = query(
                collection(db, "rents"),
                where("tenantId", "==", tenantDocId),
                where("month", "==", currentMonth)
            );
            snap = await getDocs(q);
            if (!snap.empty) return { doc: snap.docs[0], data: snap.docs[0].data() };

            // Strategy 3: by stored uid
            if (data.uid) {
                q = query(
                    collection(db, "rents"),
                    where("tenantId", "==", data.uid),
                    where("month", "==", currentMonth)
                );
                snap = await getDocs(q);
                if (!snap.empty) return { doc: snap.docs[0], data: snap.docs[0].data() };
            }
            return null;
        }

        async function loadTenants() {
            const tenantTable = document.getElementById("tenantTable");
            tenantTable.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading tenants...</td></tr>';
            const querySnapshot = await getDocs(collection(db, "tenants"));
            tenantTable.innerHTML = "";
            let totalTenants = 0, totalRent = 0, paidRent = 0;
            const now = new Date();
            const currentMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });

            for (const docSnap of querySnapshot.docs) {
                const data = docSnap.data();
                totalTenants++;
                let currentStatus = "pending";
                let displayRent = data.rent || 0;

                const rentRecord = await findCurrentMonthRentRecord(docSnap.id, data, currentMonth);
                if (rentRecord) {
                    currentStatus = rentRecord.data.status;
                    displayRent = rentRecord.data.amount || data.rent || 0;
                }

                if (currentStatus === "paid") paidRent += displayRent;
                totalRent += (data.rent || 0);

                let statusClass = currentStatus === "paid" ? "status-paid" : (currentStatus === "overdue" ? "status-overdue" : "status-pending");
                const joiningDate = formatJoiningDate(data.joiningDate);
                const row = document.createElement("tr");
                // data-label attributes for mobile card layout
                row.innerHTML = `
                    <td data-label="Name">${data.name || "N/A"}</td>
                    <td data-label="Room">${data.room || "N/A"}</td>
                    <td data-label="Joined">${joiningDate}</td>
                    <td data-label="Rent (₹)">₹${displayRent}</td>
                    <td data-label="Status"><span class="status-badge ${statusClass}">${currentStatus}</span></td>
                    <td data-label="Actions">
                        <button class="delete-btn" onclick="window.deleteTenant('${docSnap.id}')"><i class="fas fa-trash"></i></button>
                        <button class="view-btn" onclick="window.viewTenant('${docSnap.id}')"><i class="fas fa-eye"></i></button>
                    </td>
                `;
                tenantTable.appendChild(row);
            }

            document.getElementById("totalTenants").innerText = totalTenants;
            document.getElementById("totalRent").innerText = `₹${totalRent}`;
            document.getElementById("paidRent").innerText = `₹${paidRent}`;
            document.getElementById("pendingRent").innerText = `₹${totalRent - paidRent}`;
        }

        window.deleteTenant = async (tenantId) => {
            if (confirm("Are you sure? This will delete all rent records for this tenant.")) {
                const rentsQuery = query(collection(db, "rents"), where("tenantId", "==", tenantId));
                const rentsSnap = await getDocs(rentsQuery);
                for (const rentDoc of rentsSnap.docs) await deleteDoc(doc(db, "rents", rentDoc.id));
                await deleteDoc(doc(db, "tenants", tenantId));
                showMessage("Tenant deleted successfully!", "success");
                loadTenants();
            }
        };
        window.viewTenant = (tenantId) => alert(`View details for tenant ID: ${tenantId}`);

        document.getElementById("addTenant").addEventListener("click", async () => {
            const name = document.getElementById("name").value;
            const room = document.getElementById("room").value;
            const rent = document.getElementById("rent").value;
            const joiningDate = document.getElementById("joiningDate").value;
            const userUid = document.getElementById("userUid").value;
            if (!name || !room || !rent || !joiningDate || !userUid) {
                showMessage("Please fill all fields including User UID", "error");
                return;
            }
            const tenantRef = doc(db, "tenants", userUid);
            await setDoc(tenantRef, {
                name: name,
                room: room,
                rent: Number(rent),
                joiningDate: new Date(joiningDate),
                uid: userUid,
                status: "pending"
            });
            showMessage("Tenant added successfully!", "success");
            document.getElementById("name").value = "";
            document.getElementById("room").value = "";
            document.getElementById("rent").value = "";
            document.getElementById("joiningDate").value = new Date().toISOString().split('T')[0];
            document.getElementById("userUid").value = "";
            loadTenants();
        });

        // Generate monthly rent – now reliably checks for existing record (paid or pending)
        document.getElementById("generateRentBtn").addEventListener("click", async () => {
            const tenants = await getDocs(collection(db, "tenants"));
            const now = new Date();
            const currentMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });
            const currentYear = now.getFullYear();
            const currentMonthIndex = now.getMonth();
            let generatedCount = 0, skippedCount = 0;

            for (const tenantDoc of tenants.docs) {
                const data = tenantDoc.data();
                const joiningDate = data.joiningDate ? new Date(data.joiningDate) : null;
                if (joiningDate) {
                    const joinYear = joiningDate.getFullYear();
                    const joinMonth = joiningDate.getMonth();
                    if (joinYear > currentYear || (joinYear === currentYear && joinMonth > currentMonthIndex)) {
                        skippedCount++;
                        continue;
                    }
                }

                // Use normalised matching to check if any rent record exists for this tenant in this month
                const existingRecord = await findCurrentMonthRentRecord(tenantDoc.id, data, currentMonth);
                if (existingRecord) {
                    skippedCount++;
                    continue;
                }

                // No record exists – create a new pending rent record
                const tenantIdForRent = data.uid ? data.uid : tenantDoc.id;
                await addDoc(collection(db, "rents"), {
                    tenantId: tenantIdForRent,
                    tenantName: data.name,
                    room: data.room,
                    amount: data.rent,
                    month: currentMonth,
                    status: "pending",
                    date: new Date(),
                    receiptGenerated: false
                });
                generatedCount++;
            }
            showMessage(`✅ Generated ${generatedCount} new rent records. ${skippedCount} already existed (paid or pending).`, "success");
            loadTenants();
        });

        document.getElementById("viewPaymentsBtn").addEventListener("click", () => window.location.href = "admin-payments.html");
        document.getElementById("refreshBtn").addEventListener("click", loadTenants);
        document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth).then(() => window.location.href = "login.html"));

        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists() || userDoc.data().role !== "admin") {
                alert("Access denied. Admin only.");
                window.location.href = "dashboard.html";
                return;
            }
            await loadTenants();
        });
    </script>
    <script>
        // Disable text selection
document.body.style.userSelect = "none";
document.body.style.webkitUserSelect = "none";

// Create custom inspect popup
const inspectMessage = document.createElement("div");

inspectMessage.innerHTML = `
    <div style="
                font-size:1rem;
                font-weight:600;
                margin-bottom:8px;
                color:#7bc9ff;
                display:flex;
                align-items:center;
                gap:8px;
            ">
                <i class='fas fa-shield-alt'></i>
                RentFlow Protected
            </div>

            <div style="
                font-size:0.9rem;
                line-height:1.5;
                color:#d8ecff;
            ">
                This little world was built with care 💙 <br>
                So let the magic stay hidden there.
            </div>
`;

inspectMessage.style.position = "fixed";
inspectMessage.style.zIndex = "999999";
inspectMessage.style.padding = "18px 22px";
inspectMessage.style.borderRadius = "22px";
inspectMessage.style.background = "rgba(18, 25, 45, 0.92)";
inspectMessage.style.backdropFilter = "blur(18px)";
inspectMessage.style.webkitBackdropFilter = "blur(18px)";
inspectMessage.style.border = "1px solid rgba(0, 183, 255, 0.25)";
inspectMessage.style.boxShadow = `
    0 10px 35px rgba(0,0,0,0.45),
    0 0 20px rgba(0,183,255,0.18)
`;
inspectMessage.style.maxWidth = "320px";
inspectMessage.style.opacity = "0";
inspectMessage.style.pointerEvents = "none";
inspectMessage.style.transition = "opacity 0.25s ease, transform 0.25s ease";
inspectMessage.style.transform = "translateY(10px)";
inspectMessage.style.display = "none";

document.body.appendChild(inspectMessage);

// Show popup on right click
document.addEventListener("contextmenu", (e) => {
    e.preventDefault();

    inspectMessage.style.display = "block";

    let x = e.clientX;
    let y = e.clientY;

    const boxWidth = 320;
    const boxHeight = 120;

    if (x + boxWidth > window.innerWidth) {
        x = window.innerWidth - boxWidth - 20;
    }

    if (y + boxHeight > window.innerHeight) {
        y = window.innerHeight - boxHeight - 20;
    }

    inspectMessage.style.left = x + "px";
    inspectMessage.style.top = y + "px";

    requestAnimationFrame(() => {
        inspectMessage.style.opacity = "1";
        inspectMessage.style.transform = "translateY(0px)";
    });
});

// Hide popup on click
document.addEventListener("click", () => {
    inspectMessage.style.opacity = "0";
    inspectMessage.style.transform = "translateY(10px)";

    setTimeout(() => {
        inspectMessage.style.display = "none";
    }, 250);
});

// Disable inspect shortcuts
document.addEventListener("keydown", (e) => {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }
});
    </script>
