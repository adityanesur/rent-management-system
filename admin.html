<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0b0f1c;
color:white;
padding:40px;
}

.card{
background:#1a2238;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px 20px;
background:#00b7ff;
border:none;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:30px;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<div class="card">

<h2>Admin Dashboard</h2>

<h3>Add Tenant</h3>

<input id="name" placeholder="Tenant Name">
<input id="room" placeholder="Room Number">
<input id="rent" placeholder="Rent Amount">

<button id="addTenant">Add Tenant</button>

<h3>Tenants List</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Room</th>
<th>Rent</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tenantTable"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "YOUR_KEY",
authDomain: "rent-management-system-86ccc.firebaseapp.com",
projectId: "rent-management-system-86ccc",

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const tenantTable = document.getElementById("tenantTable");

document.getElementById("addTenant").addEventListener("click", async ()=>{

const name = document.getElementById("name").value;
const room = document.getElementById("room").value;
const rent = document.getElementById("rent").value;

await addDoc(collection(db,"tenants"),{

name:name,
roomId:room,
rent:rent,
status:"pending"

});

alert("Tenant Added");

loadTenants();

});

async function loadTenants(){

tenantTable.innerHTML="";

const querySnapshot = await getDocs(collection(db,"tenants"));

querySnapshot.forEach(doc=>{

const data = doc.data();

tenantTable.innerHTML+=`

<tr>
<td>${data.name}</td>
<td>${data.roomId}</td>
<td>₹${data.rent}</td>
<td>${data.status}</td>
</tr>

`;

});

}

loadTenants();

</script>

</body>
</html>
