<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentFlow | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1f 0%, #030614 100%);
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 183, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(123, 201, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 2;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #7bc9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .brand p {
            color: #b0d0ff;
            font-size: 1rem;
        }

        .login-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 183, 255, 0.2);
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 183, 255, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #ffffff, #7bc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #7bc9ff;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(10, 20, 40, 0.6);
            border: 2px solid rgba(0, 183, 255, 0.2);
            border-radius: 50px;
            font-size: 1rem;
            color: #ffffff;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #00b7ff;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.3);
            background: rgba(10, 20, 40, 0.8);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b7ff, #3e9cff);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 183, 255, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 183, 255, 0.6);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid rgba(0, 183, 255, 0.3);
            color: #ffffff;
        }

        .btn-outline:hover {
            border-color: #00b7ff;
            background: rgba(0, 183, 255, 0.1);
            transform: translateY(-3px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #b0d0ff;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0, 183, 255, 0.2);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }

        #message {
            text-align: center;
            font-size: 0.95rem;
            min-height: 2rem;
            padding: 0.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .success {
            color: #5cff9d;
            background: rgba(92, 255, 157, 0.1);
            border: 1px solid rgba(92, 255, 157, 0.3);
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .info {
            color: #7bc9ff;
            background: rgba(123, 201, 255, 0.1);
            border: 1px solid rgba(123, 201, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .brand .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand">
            <div class="logo">RentFlow</div>
            <p>Welcome back! Please login to continue</p>
        </div>
        
        <div class="login-card">
            <h2><i class="fas fa-lock"></i> Member Login</h2>
            
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email address" value="test@example.com">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" value="password123">
            </div>
            
            <button class="btn btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            
            <button class="btn btn-outline" id="signupBtn">
                <i class="fas fa-user-plus"></i> Create New Account
            </button>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <a href="index.html" style="text-decoration: none;">
                <button class="btn btn-outline" id="homeBtn">
                    <i class="fas fa-home"></i> Back to Home
                </button>
            </a>
            
            <div id="message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
            authDomain: "rent-management-system-86ccc.firebaseapp.com",
            projectId: "rent-management-system-86ccc",
            storageBucket: "rent-management-system-86ccc.appspot.com",
            messagingSenderId: "676999561040",
            appId: "1:676999561040:web:f1166d818a33c5a008f655"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const message = document.getElementById("message");
        const loginBtn = document.getElementById("loginBtn");
        const signupBtn = document.getElementById("signupBtn");

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            signupBtn.disabled = isLoading;
        }

        async function handleAuth(email, password, isSignUp) {
            if (!email || !password) {
                message.innerHTML = "❌ Please enter email and password";
                message.className = "error";
                return;
            }

            message.innerHTML = isSignUp ? "⏳ Creating account..." : "⏳ Logging in...";
            message.className = "info";
            setLoading(true);

            try {
                let userCredential;
                
                if (isSignUp) {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Create user document with tenant role by default
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        email: email,
                        role: "tenant",
                        createdAt: new Date().toISOString()
                    });
                    
                    message.innerHTML = "✅ Account created! You can now login.";
                    message.className = "success";
                    setLoading(false);
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                    
                    const uid = userCredential.user.uid;
                    const userDoc = await getDoc(doc(db, "users", uid));
                    
                    if (!userDoc.exists()) {
                        message.innerHTML = "❌ User profile not found";
                        message.className = "error";
                        setLoading(false);
                        return;
                    }
                    
                    const role = userDoc.data().role;
                    
                    message.innerHTML = "✅ Login successful! Redirecting...";
                    message.className = "success";
                    
                    setTimeout(() => {
                        if (role === "admin") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "dashboard.html";
                        }
                    }, 1500);
                }
            } catch (error) {
                message.innerHTML = "❌ " + error.message;
                message.className = "error";
                setLoading(false);
            }
        }

        loginBtn.addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            handleAuth(email, password, false);
        });

        signupBtn.addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            if (password.length < 6) {
                message.innerHTML = "❌ Password must be at least 6 characters";
                message.className = "error";
                return;
            }
            
            handleAuth(email, password, true);
        });
    </script>
</body>
</html>
