<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tenant Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(160deg,#0b0f1c,#03050b);
color:white;
}

.card{

width:360px;
padding:40px;

background:rgba(18,25,45,0.6);
backdrop-filter:blur(12px);

border-radius:2rem;
border:1px solid rgba(110,180,255,0.2);

box-shadow:0 0 30px rgba(0,183,255,0.2);
}

h2{
font-family:Poppins;
text-align:center;
margin-bottom:25px;
background:linear-gradient(90deg,#ffffff,#7bc9ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{

width:100%;
padding:12px;
margin-bottom:15px;

border-radius:10px;
border:none;

background:#101a33;
color:white;

}

button{

width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:30px;

background:linear-gradient(135deg,#00b7ff,#3e9cff);
color:white;

cursor:pointer;
}

button:hover{
transform:scale(1.03);
}

#message{

margin-top:15px;
text-align:center;
font-size:14px;

}

.success{
color:#5cff9d;
}

.error{
color:#ff6b6b;
}

</style>

</head>

<body>

<div class="card">

<h2>Tenant Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="signupBtn">Create Account</button>

<button id="loginBtn">Login</button>

<div id="message"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyB8FiQNgV8EqhMJEyA5A_ZfmFiZa1Iqm4U",
authDomain: "rent-management-system-86ccc.firebaseapp.com",
projectId: "rent-management-system-86ccc",
storageBucket: "rent-management-system-86ccc.appspot.com",
messagingSenderId: "676999561040",
appId: "1:676999561040:web:f1166d818a33c5a008f655"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const message = document.getElementById("message");

document.getElementById("signupBtn").addEventListener("click", () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

message.innerHTML="Creating account...";

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

message.innerHTML="✅ Account created successfully";
message.className="success";

})

.catch(error=>{

message.innerHTML="❌ "+error.message;
message.className="error";

});

});

document.getElementById("loginBtn").addEventListener("click", () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

message.innerHTML="Logging in...";

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

message.innerHTML="✅ Login successful";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

})

.catch(error=>{

message.innerHTML="❌ "+error.message;
message.className="error";

});

});

</script>

</body>
</html>
